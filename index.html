<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a6e5a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Отель">
<title>Hotel Manager</title>

<!-- ═══════════════════════════════════════════════
     FIREBASE CONFIG — замени на свои данные
     Получить: console.firebase.google.com
     Проект → Project Settings → Your apps → Web app
═══════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, update, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCaKk9GlVPYRCxWx3k73napxqBFxgoUaL0",
    authDomain:        "hotel-manager-1b6fb.firebaseapp.com",
    databaseURL:       "https://hotel-manager-1b6fb-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "hotel-manager-1b6fb",
    storageBucket:     "hotel-manager-1b6fb.firebasestorage.app",
    messagingSenderId: "327963847461",
    appId:             "1:327963847461:web:d1d5697ea9c1b2daa208cc"
  };

  // ═══════════════════════════════════════════════
  // CLOUDFLARE WORKER URL — замени после деплоя
  // ═══════════════════════════════════════════════
  const WORKER_URL = "https://hotel-notify.ТВОЙ_АККАУНТ.workers.dev";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // ── Утилиты ──────────────────────────────────
  const ds = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const addD = (base,n) => { const d=new Date(base); d.setDate(d.getDate()+n); return d; };
  const todayStr = () => ds(new Date());
  const fd = s => { if(!s) return '—'; const p=s.split('-'); return `${p[2]}.${p[1]}`; };
  const fdt = ts => {
    if(!ts) return '';
    const d=new Date(ts), t=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return d.toDateString()===new Date().toDateString() ? `сегодня ${t}` : `${d.getDate()}.${d.getMonth()+1} ${t}`;
  };
  const DAYS_RU = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const dayName = s => DAYS_RU[new Date(s+'T12:00:00').getDay()];
  const ROOM_TYPES = ['Стандарт','Делюкс','Люкс','Семейный','Одноместный'];

  // ── Роли и маршрутизация уведомлений ─────────
  const ROLES = {
    hotel:    { label: 'Администратор отеля',    icon: '🏨', notifyRoles: ['senior','admin'] },
    senior:   { label: 'Ирина (Старший)',        icon: '👔', notifyRoles: ['hotel','admin'] },
    cleaner:  { label: 'Уборщик',                icon: '🧹', notifyRoles: ['hotel','senior','admin'] },
    admin:    { label: 'Администратор системы',  icon: '⚙',  notifyRoles: [] },
  };

  // ── Состояние ─────────────────────────────────
  let currentUser = null;
  let currentRole = null;
  let currentUserId = null;
  let currentUserName = null;
  let mainTab = 'rooms';
  let subTab = 'day';
  let logFilter = 'all';
  let dayOffset = 0;
  let rooms = {};
  let users = {};
  let queue = {};
  let bkfSchedule = {};
  let changelog = [];

  // ── Firebase слушатели реального времени ──────
  function startListeners() {
    onValue(ref(db,'rooms'), snap => {
      rooms = snap.val() || {};
      renderAll();
    });
    onValue(ref(db,'queue'), snap => {
      queue = snap.val() || {};
      renderAll();
    });
    onValue(ref(db,'bkfSchedule'), snap => {
      bkfSchedule = snap.val() || {};
      renderAll();
    });
    onValue(ref(db,'changelog'), snap => {
      const raw = snap.val() || {};
      changelog = Object.values(raw).sort((a,b) => (b.ts||0)-(a.ts||0)).slice(0,100);
      renderAll();
    });
    onValue(ref(db,'users'), snap => {
      users = snap.val() || {};
    });
  }

  // ── Инициализация номеров (первый запуск) ─────
  async function initRooms() {
    const snap = await get(ref(db,'rooms'));
    if(snap.exists()) return;
    const batch = {};
    for(let f=1; f<=3; f++) {
      for(let n=1; n<=10; n++) {
        const id = `${f}0${n}`;
        batch[id] = {
          id, floor: f, name: id,
          type: ROOM_TYPES[Math.floor(Math.random()*5)],
          occupied: false, checkout: false, guests: 0,
          checkinDate: null, checkinTime: '14:00',
          checkoutDate: null, checkoutTime: '11:00',
          cleanStatus: 'dirty', skipClean: false,
          lastChangedBy: null, lastChangedAt: null
        };
      }
    }
    await set(ref(db,'rooms'), batch);
  }

  // ── Отправка WhatsApp через Cloudflare Worker ─
  async function sendWhatsApp(toPhones, message) {
    if(!WORKER_URL || WORKER_URL.includes('ТВОЙ_АККАУНТ')) return; // демо режим
    try {
      await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phones: toPhones, message })
      });
    } catch(e) {
      console.warn('WhatsApp not configured:', e);
    }
  }

  // Отправить уведомления по маршруту роли
  async function notify(fromRole, message) {
    const roleInfo = ROLES[fromRole] || ROLES.cleaner;
    const recipients = roleInfo.notifyRoles || [];
    if(!recipients.length) return;

    // Найти телефоны получателей
    const phones = [];
    Object.values(users).forEach(u => {
      if(recipients.includes(u.role) && u.phone && u.active !== false) {
        phones.push(u.phone);
      }
    });

    if(phones.length) {
      const fullMsg = `${roleInfo.icon} ${currentUserName}: ${message}`;
      await sendWhatsApp(phones, fullMsg);
    }

    // Показать уведомление в интерфейсе
    showToast(message);
  }

  // ── Журнал ────────────────────────────────────
  async function addLog(roomId, action, color) {
    const entry = {
      roomId: roomId || null,
      action,
      by: currentUserName || currentRole,
      byRole: currentRole,
      ts: Date.now(),
      color: color || '#888'
    };
    await push(ref(db,'changelog'), entry);
  }

  // ── Вспомогательные ──────────────────────────
  function ostatus(r) {
    if(!r) return 'emp';
    if(r.checkout) return 'co';
    if(r.checkinDate === todayStr() && !r.occupied) return 'ci';
    if(r.occupied) return 'occ';
    return 'emp';
  }
  function olabel(r) {
    if(!r) return 'Свободен';
    if(r.checkout) return 'Выезд';
    if(r.checkinDate === todayStr() && !r.occupied) return 'Въезд сегодня';
    if(r.occupied) return 'Занят';
    return 'Свободен';
  }
  function priLabel(r) {
    if(!r) return null;
    if(r.checkout) return '⚑ Срочно — выезд';
    if(r.checkinDate === todayStr() && !r.occupied) return `↑ Въезд ${r.checkinTime||''}`;
    return null;
  }
  function getBkf(roomId, dateS) {
    return bkfSchedule[`${roomId}_${dateS}`] || { time: '08:00', noBkf: false };
  }
  function calcBkfDay(dateS) {
    const map = {}; let total = 0;
    Object.values(rooms).forEach(r => {
      if(!r.occupied || !r.checkinDate || !r.checkoutDate) return;
      if(dateS < r.checkinDate || dateS > r.checkoutDate) return;
      const b = getBkf(r.id, dateS);
      if(!b.noBkf) {
        total += r.guests;
        if(!map[b.time]) map[b.time] = [];
        map[b.time].push(r);
      }
    });
    return { total, map };
  }

  // ── Действия ─────────────────────────────────

  async function saveRoom(roomId) {
    const r = rooms[roomId];
    if(!r) return;
    const prevSt = ostatus(r);

    const v     = document.getElementById('m-st')?.value;
    const cinD  = document.getElementById('m-cind')?.value;
    const cinT  = document.getElementById('m-cint')?.value;
    const coutD = document.getElementById('m-coutd')?.value;
    const coutT = document.getElementById('m-coutt')?.value;
    const cl    = document.getElementById('m-cl')?.value;
    const guests = parseInt(document.getElementById('gc')?.textContent) || r.guests;

    const updates = { guests };
    if(v) {
      updates.occupied  = (v === 'occ' || v === 'co');
      updates.checkout  = (v === 'co');
    }
    if(v === 'emp') {
      updates.checkinDate = null; updates.checkoutDate = null;
      updates.occupied = false; updates.checkout = false;
      updates.bkfNeeded = false;
    }
    if(v === 'ci') { updates.checkinDate = todayStr(); updates.occupied = false; updates.checkout = false; }
    if(cinD && v !== 'emp') updates.checkinDate = cinD;
    if(cinT) updates.checkinTime = cinT;
    if(coutD && v !== 'emp') updates.checkoutDate = coutD;
    if(coutT) updates.checkoutTime = coutT;
    if(cl) { updates.skipClean = (cl === 'skip'); updates.cleanStatus = cl === 'skip' ? 'dirty' : cl; }
    updates.lastChangedBy = currentUserName;
    updates.lastChangedAt = Date.now();

    await update(ref(db, `rooms/${roomId}`), updates);

    const merged = { ...r, ...updates };
    const newSt = ostatus(merged);
    const changes = [];
    if(newSt !== prevSt) changes.push(`статус → "${olabel(merged)}"`);
    if(updates.checkinDate)  changes.push(`въезд ${fd(updates.checkinDate)} ${updates.checkinTime||''}`);
    if(updates.checkoutDate) changes.push(`выезд ${fd(updates.checkoutDate)} ${updates.checkoutTime||''}`);
    if(cl === 'cleaned') changes.push('уборка выполнена');

    if(changes.length) {
      const msg = `Номер ${r.name}: ${changes.join(' · ')}`;
      await addLog(roomId, msg, '#1a6e5a');
      await notify(currentRole, msg);
    }

    // Добавить в очередь задач
    if(merged.checkout || (!merged.occupied && prevSt === 'occ')) {
      await addToQueue(roomId, 'clean');
    }
    if(merged.occupied && !merged.checkout && merged.checkinDate && merged.checkoutDate) {
      await addToQueue(roomId, 'bkf');
      // Создать расписание завтраков
      const bkfUpdates = {};
      let d = new Date(merged.checkinDate + 'T12:00:00');
      const end = new Date(merged.checkoutDate + 'T12:00:00');
      while(d <= end) {
        const dstr = ds(d);
        const key = `${roomId}_${dstr}`;
        if(!bkfSchedule[key]) bkfUpdates[key] = { time: '08:00', noBkf: false };
        d = addD(d,1);
      }
      if(Object.keys(bkfUpdates).length) await update(ref(db,'bkfSchedule'), bkfUpdates);
    }

    closeModal();
  }

  async function addToQueue(roomId, type) {
    const existing = Object.values(queue).find(q => q.roomId === roomId && q.type === type && !q.done);
    if(!existing) {
      await push(ref(db,'queue'), {
        roomId, type,
        assignedTo: [],
        done: false,
        doneBy: null,
        createdAt: Date.now()
      });
    }
  }

  async function confirmAssign(taskId) {
    const task = queue[taskId];
    if(!task || !task.assignedTo || task.assignedTo.length === 0) return;
    const r = rooms[task.roomId];
    const names = task.assignedTo.map(uid => {
      const u = Object.values(users).find(u => u.id === uid);
      return u ? u.name : uid;
    }).filter(Boolean);
    const tl = task.type === 'clean' ? 'уборка' : 'завтрак';
    const msg = `Номер ${r?.name}: задача → ${names.join(' + ')} (${tl})`;
    await addLog(task.roomId, msg, '#6a4ecf');

    // Уведомить каждого уборщика
    for(let i=0; i<task.assignedTo.length; i++) {
      const uid = task.assignedTo[i];
      const u = Object.values(users).find(u => u.id === uid);
      if(u?.phone) {
        const others = names.filter((_,j) => j !== i);
        const cleanerMsg = `👔 Ирина: Номер ${r?.name}: ${tl}${others.length ? ' · вместе с ' + others.join(', ') : ''}${r?.checkoutDate ? ' · выезд ' + fd(r.checkoutDate) + ' ' + r.checkoutTime : ''}`;
        await sendWhatsApp([u.phone], cleanerMsg);
      }
    }
    // Уведомить отель и админа
    await notify('senior', msg);
  }

  async function markDone(taskId, cleanerId) {
    const task = queue[taskId];
    if(!task) return;
    const r = rooms[task.roomId];
    const u = Object.values(users).find(u => u.id === cleanerId);
    await update(ref(db, `queue/${taskId}`), { done: true, doneBy: cleanerId, doneAt: Date.now() });
    if(task.type === 'clean') {
      await update(ref(db, `rooms/${task.roomId}`), { cleanStatus: 'cleaned', lastChangedBy: u?.name, lastChangedAt: Date.now() });
    }
    const lbl = task.type === 'clean' ? 'уборка выполнена' : 'завтрак доставлен';
    const msg = `Номер ${r?.name}: ✓ ${lbl} (${u?.name})`;
    await addLog(task.roomId, msg, '#2a7acf');
    await notify('cleaner', msg);
  }

  async function markIssue(taskId, cleanerId) {
    const task = queue[taskId];
    if(!task) return;
    const r = rooms[task.roomId];
    const u = Object.values(users).find(u => u.id === cleanerId);
    const msg = `Номер ${r?.name}: ⚠ проблема (${u?.name})`;
    await addLog(task.roomId, msg, '#e24b4a');
    await notify('cleaner', msg);
  }

  async function saveBkfDay(roomId, dateS) {
    const el = document.getElementById(`bt-${roomId}-${dateS}`);
    if(!el) return;
    const key = `${roomId}_${dateS}`;
    const cur = bkfSchedule[key] || {};
    await update(ref(db, `bkfSchedule/${key}`), { time: el.value, noBkf: cur.noBkf || false });
    const r = rooms[roomId];
    const msg = `Номер ${r?.name}: завтрак ${fd(dateS)} → ${el.value}`;
    await addLog(roomId, msg, '#b85c00');
    await notify(currentRole, msg);
    const ok = document.getElementById(`ok-${roomId}-${dateS}`);
    if(ok) { ok.style.display = 'inline'; setTimeout(()=>ok.style.display='none', 2000); }
  }

  async function toggleNoBkf(roomId, dateS) {
    const key = `${roomId}_${dateS}`;
    const cur = bkfSchedule[key] || { time: '08:00', noBkf: false };
    const newNoBkf = !cur.noBkf;
    await update(ref(db, `bkfSchedule/${key}`), { noBkf: newNoBkf });
    const r = rooms[roomId];
    const msg = `Номер ${r?.name}: завтрак ${fd(dateS)} — ${newNoBkf ? 'пропуск' : 'восстановлен'}`;
    await addLog(roomId, msg, '#b85c00');
    await notify(currentRole, msg);
  }

  async function adminSaveRoom(roomId) {
    const nameEl = document.getElementById(`an-${roomId}`);
    const typeEl = document.getElementById(`at-${roomId}`);
    if(!nameEl || !typeEl) return;
    const r = rooms[roomId];
    if(nameEl.value !== r.name || typeEl.value !== r.type) {
      await update(ref(db, `rooms/${roomId}`), { name: nameEl.value, type: typeEl.value });
      await addLog(roomId, `Номер ${roomId} → "${nameEl.value}" (${typeEl.value})`, '#4a2a8a');
      showToast('Сохранено');
    }
  }

  async function adminSaveUser(userId) {
    const nameEl  = document.getElementById(`uname-${userId}`);
    const phoneEl = document.getElementById(`uphone-${userId}`);
    const roleEl  = document.getElementById(`urole-${userId}`);
    if(!nameEl || !phoneEl || !roleEl) return;
    await update(ref(db, `users/${userId}`), {
      name: nameEl.value,
      phone: phoneEl.value,
      role: roleEl.value
    });
    showToast('Пользователь сохранён');
  }

  async function adminToggleUser(userId, active) {
    await update(ref(db, `users/${userId}`), { active });
    showToast(active ? 'Доступ восстановлен' : 'Доступ отключён');
  }

  async function adminAddUser() {
    const nameEl  = document.getElementById('new-name');
    const phoneEl = document.getElementById('new-phone');
    const roleEl  = document.getElementById('new-role');
    const emailEl = document.getElementById('new-email');
    const passEl  = document.getElementById('new-pass');
    if(!nameEl?.value || !emailEl?.value || !passEl?.value) {
      showToast('Заполни имя, email и пароль'); return;
    }
    // В реальной системе здесь создаётся аккаунт через Firebase Admin SDK
    // В демо просто добавляем в базу
    const newRef = push(ref(db,'users'));
    await set(newRef, {
      id: newRef.key,
      name: nameEl.value,
      phone: phoneEl.value || '',
      role: roleEl.value,
      email: emailEl.value,
      active: true,
      createdAt: Date.now()
    });
    ['new-name','new-phone','new-email','new-pass'].forEach(id => {
      const el = document.getElementById(id); if(el) el.value = '';
    });
    showToast(`Пользователь ${nameEl.value} добавлен`);
  }

  async function toggleAssign(taskId, userId) {
    const task = queue[taskId];
    if(!task) return;
    const assignedTo = [...(task.assignedTo || [])];
    const idx = assignedTo.indexOf(userId);
    if(idx >= 0) assignedTo.splice(idx, 1);
    else assignedTo.push(userId);
    await update(ref(db, `queue/${taskId}`), { assignedTo });
  }

  // ── Рендер ────────────────────────────────────

  function updateStats() {
    const rArr = Object.values(rooms);
    const qArr = Object.values(queue);
    document.getElementById('s-occ').textContent = rArr.filter(r => r.occupied && !r.checkout).length;
    document.getElementById('s-emp').textContent = rArr.filter(r => !r.occupied).length;
    document.getElementById('s-need').textContent = qArr.filter(q => !q.done).length;
    document.getElementById('s-done').textContent = qArr.filter(q => q.done).length;
    const { total, map } = calcBkfDay(todayStr());
    document.getElementById('bkf-total').textContent = total;
    const el = document.getElementById('bkf-times');
    const keys = Object.keys(map).sort();
    el.innerHTML = keys.length
      ? keys.map(t => `<div class="bkf-slot">${t} — <b>${map[t].reduce((s,r)=>s+r.guests,0)} порц.</b></div>`).join('')
      : '<div class="bkf-slot" style="color:var(--color-text-secondary)">нет данных</div>';
  }

  function getMainTabs() {
    if(currentRole === 'hotel')   return [{k:'rooms',l:'Номера'},{k:'breakfast',l:'Завтраки'},{k:'log',l:'Журнал'}];
    if(currentRole === 'senior')  return [{k:'queue',l:'Задачи'},{k:'rooms',l:'Номера'},{k:'breakfast',l:'Завтраки'},{k:'log',l:'Журнал'}];
    if(currentRole === 'admin')   return [{k:'rooms',l:'Номера'},{k:'breakfast',l:'Завтраки'},{k:'users',l:'Пользователи'},{k:'settings',l:'Настройки'},{k:'log',l:'Журнал'}];
    return [{k:'mytasks',l:'Мои задачи'},{k:'rooms',l:'Все номера'},{k:'breakfast',l:'Завтраки'}];
  }

  function setMainTab(k) {
    mainTab = k; dayOffset = 0;
    document.querySelectorAll('.mt').forEach(b => b.classList.toggle('active', b.dataset.k === k));
    renderContent();
  }
  window.setMainTab = setMainTab;

  function renderTabs() {
    document.getElementById('main-tabs').innerHTML = getMainTabs()
      .map(t => `<button class="mt${mainTab===t.k?' active':''}" data-k="${t.k}" onclick="setMainTab('${t.k}')">${t.l}</button>`).join('');
  }

  function roomsGridHTML(clickable) {
    const sorted = Object.values(rooms).sort((a,b) => {
      const p = r => { const s=ostatus(r); if(s==='co')return 0; if(s==='ci')return 1; if(s==='occ')return 2; return 3; };
      return p(a)-p(b);
    });
    if(!sorted.length) return '<div class="empty-state">Нет номеров</div>';

    return sorted.map(r => {
      const st = ostatus(r);
      const last = changelog.find(l => l.roomId === r.id);
      const assignedQ = Object.values(queue).find(q => q.roomId === r.id && !q.done && q.assignedTo?.length > 0);
      const assignedNames = assignedQ
        ? assignedQ.assignedTo.map(uid => { const u=Object.values(users).find(u=>u.id===uid); return u?.name||''; }).filter(Boolean).join(', ')
        : null;
      const myTask = currentRole === 'cleaner'
        ? Object.values(queue).find(q => q.roomId===r.id && q.assignedTo?.includes(currentUserId) && !q.done)
        : null;
      const pri = priLabel(r);
      const todayBkf = r.occupied && !r.checkout ? getBkf(r.id, todayStr()) : null;
      return `<div class="rc ${st}${clickable?' clickable':''}" ${clickable?`onclick="openModal('${r.id}')"`:''}>
        <div class="rc-num">${r.name}<span class="rc-type">${r.type}</span></div>
        <div class="rc-st ${st}">${olabel(r)}</div>
        ${r.guests>0 ? `<div class="rc-ln">${r.guests} гост.</div>` : ''}
        ${r.checkinDate&&r.occupied ? `<div class="rc-ln green">↓ ${fd(r.checkinDate)} ${r.checkinTime||''}</div>` : ''}
        ${r.checkoutDate&&r.occupied ? `<div class="rc-ln${r.checkout?' alert':''}">↑ ${fd(r.checkoutDate)} ${r.checkoutTime||''}</div>` : ''}
        ${todayBkf&&!todayBkf.noBkf ? `<div class="rc-ln alert">☕ ${todayBkf.time}</div>` : r.occupied&&!r.checkout ? `<div class="rc-ln muted">☕ без завтр.</div>` : ''}
        ${pri ? `<div class="rc-ln alert small">${pri}</div>` : ''}
        ${assignedNames ? `<div class="rc-ln blue">→ ${assignedNames}</div>` : ''}
        ${myTask ? `<div class="my-task-badge">Моя задача</div>` : ''}
        ${last ? `<div class="rc-who">${last.by} · ${fdt(last.ts)}</div>` : ''}
        <div class="cb ${r.skipClean?'skip':r.cleanStatus}"></div>
      </div>`;
    }).join('');
  }

  function bkfTodayHTML() {
    const viewDs = ds(addD(new Date(), dayOffset));
    const { total, map } = calcBkfDay(viewDs);
    const label = dayOffset===0?'Сегодня':dayOffset===1?'Завтра':dayOffset===-1?'Вчера':`${dayName(viewDs)}, ${fd(viewDs)}`;
    const keys = Object.keys(map).sort();
    const groups = keys.map(t => {
      const rs = map[t]; const cnt = rs.reduce((s,r)=>s+r.guests,0);
      return `<div class="tg">
        <div class="tg-head"><div><div class="tg-time">${t}</div><div class="tg-rooms-count">${rs.length} ном.</div></div><div class="tg-cnt">${cnt} порц.</div></div>
        <div class="tg-pills">${rs.map(r=>`<span class="rpill">${r.name} ×${r.guests}</span>`).join('')}</div>
      </div>`;
    }).join('') || '<div class="empty-state">Нет завтраков на этот день</div>';
    return `<div class="day-nav">
      <button onclick="dayOffset--;renderContent()">‹</button>
      <div><div class="day-lbl">${label}</div><div class="day-sub-lbl">${fd(viewDs)}</div></div>
      <button onclick="dayOffset++;renderContent()">›</button>
    </div>
    <div class="bkf-summary-card">
      <div><div class="bkf-big-num">${total}</div><div class="bkf-sub">завтраков · ${keys.length} слота</div></div>
      <div class="bkf-right">${Object.values(map).reduce((s,a)=>s+a.length,0)} номеров</div>
    </div>
    <div class="section-lbl">По времени</div>${groups}`;
  }

  function bkfEditHTML() {
    const canEdit = currentRole === 'hotel' || currentRole === 'admin';
    const activeRooms = Object.values(rooms).filter(r => r.occupied && r.checkinDate && r.checkoutDate);
    if(!activeRooms.length) return '<div class="empty-state">Нет заселённых номеров</div>';
    return activeRooms.map(r => {
      const days = [];
      let d = new Date(r.checkinDate+'T12:00:00');
      const end = new Date(r.checkoutDate+'T12:00:00');
      while(d <= end) { days.push(ds(d)); d = addD(d,1); }
      const daysHtml = days.map(dstr => {
        const b = getBkf(r.id, dstr);
        const tod = dstr === todayStr();
        return `<div class="rbk-day${tod?' tod':''}">
          <span class="rbk-date">${tod?'★ ':''}${dayName(dstr)} ${fd(dstr)}</span>
          ${b.noBkf
            ? `<span class="bkf-skip-lbl">пропуск</span>`
            : canEdit ? `<input class="ti" type="time" id="bt-${r.id}-${dstr}" value="${b.time}" min="07:00" max="11:00">` : `<span class="bkf-time-lbl">${b.time}</span>`
          }
          ${canEdit ? `<button class="nbtn${b.noBkf?' on':''}" onclick="toggleNoBkf('${r.id}','${dstr}')">${b.noBkf?'+ вернуть':'✕ пропустить'}</button>` : ''}
          ${canEdit&&!b.noBkf ? `<button class="sv-btn" onclick="saveBkfDay('${r.id}','${dstr}')">✓</button>` : ''}
          <span class="ok-lbl" id="ok-${r.id}-${dstr}" style="display:none">✓</span>
        </div>`;
      }).join('');
      return `<div class="rbk">
        <div class="rbk-top"><div class="rbk-room">${r.name} <span class="rbk-type">${r.type}</span></div><div class="rbk-meta">${r.guests} гост. · ${fd(r.checkinDate)}–${fd(r.checkoutDate)}</div></div>
        ${daysHtml}
      </div>`;
    }).join('');
  }

  function queueHTML() {
    const unassigned = Object.entries(queue)
      .filter(([,q]) => !q.done)
      .sort(([,a],[,b]) => {
        const p = id => { const r=rooms[id]; const s=ostatus(r); if(s==='co')return 0; if(s==='ci')return 1; return 2; };
        return p(a.roomId)-p(b.roomId);
      });

    if(!unassigned.length) return '<div class="queue-panel"><div class="queue-title">Очередь задач <span class="qbadge">0</span></div><div class="empty-state">Нет задач</div></div>';

    const cleanerUsers = Object.values(users).filter(u => u.role === 'cleaner' && u.active !== false);

    const items = unassigned.map(([taskId, task]) => {
      const r = rooms[task.roomId];
      const tl = task.type === 'clean' ? 'Уборка' : `Завтрак`;
      const pri = r ? priLabel(r) : '';
      const assignedNames = (task.assignedTo||[]).map(uid => {
        const u = cleanerUsers.find(u => u.id === uid); return u?.name||'';
      }).filter(Boolean);
      const chipsHTML = cleanerUsers.map(u => {
        const sel = (task.assignedTo||[]).includes(u.id);
        return `<div class="cl-chip${sel?' selected':''}" onclick="toggleAssign('${taskId}','${u.id}')"><span>${sel?'✓':''}</span>${u.name}</div>`;
      }).join('');
      return `<div class="qi">
        <div class="qi-top">
          <div class="qi-l">
            <div class="qi-room">${r?.name||task.roomId} <span class="qi-type-lbl">${r?.type||''}</span></div>
            <div class="qi-type">${tl}${r?.checkoutDate?' · выезд '+fd(r.checkoutDate)+' '+(r.checkoutTime||''):''}</div>
            ${pri ? `<div class="qi-pri">${pri}</div>` : ''}
            ${assignedNames.length ? `<div class="qi-asgnd">→ ${assignedNames.join(' + ')}</div>` : ''}
          </div>
        </div>
        <div class="cleaners-multi">${chipsHTML}</div>
        <div class="assign-bar">
          <button class="abtn" onclick="confirmAssign('${taskId}')" ${(task.assignedTo||[]).length===0?'disabled':''}>
            ${(task.assignedTo||[]).length>0 ? `Назначить (${task.assignedTo.length})` : 'Выбрать уборщика'}
          </button>
        </div>
      </div>`;
    }).join('');

    return `<div class="queue-panel"><div class="queue-title">Очередь задач <span class="qbadge">${unassigned.length}</span></div>${items}</div>`;
  }

  function myTasksHTML() {
    const myTasks = Object.entries(queue)
      .filter(([,q]) => (q.assignedTo||[]).includes(currentUserId) && !q.done);
    if(!myTasks.length) return '<div class="empty-state">Нет назначенных задач.<br>Ожидайте сообщения от старшего.</div>';
    return myTasks.map(([taskId, task]) => {
      const r = rooms[task.roomId];
      const tc = task.type === 'bkf' ? 'bkf' : 'clean';
      const tl = task.type === 'clean' ? 'Уборка' : 'Завтрак';
      const pri = r ? priLabel(r) : '';
      const others = (task.assignedTo||[]).filter(id=>id!==currentUserId)
        .map(uid => { const u=Object.values(users).find(u=>u.id===uid); return u?.name||''; }).filter(Boolean);
      const todBkf = task.type === 'bkf' && r ? getBkf(r.id, todayStr()) : null;
      const detail = task.type === 'clean'
        ? `Убрать номер ${r?.name}${r?.floor?' ('+r.floor+' эт.)':''}`
        : `Завтрак в ${todBkf?.time||'—'} · ${r?.guests||0} порц. → номер ${r?.name}`;
      return `<div class="task-card">
        <div class="task-top"><div class="task-room">${r?.name}</div><span class="tbadge ${tc}">${tl}</span></div>
        ${pri ? `<div class="task-pri">${pri}</div>` : ''}
        ${others.length ? `<div class="task-together">Совместно с: ${others.join(', ')}</div>` : ''}
        <div class="task-detail">${detail}${r?.checkoutDate?`<br>Выезд: ${fd(r.checkoutDate)} ${r.checkoutTime||''}`:''}</div>
        <div class="tact">
          <button class="done-btn" onclick="markDone('${taskId}','${currentUserId}')">✓ Выполнено</button>
          <button class="issue-btn" onclick="markIssue('${taskId}','${currentUserId}')">⚠ Проблема</button>
        </div>
      </div>`;
    }).join('');
  }

  function logHTML() {
    const allUsers = ['all', ...new Set(changelog.map(l => l.by).filter(Boolean))];
    const filtered = logFilter === 'all' ? changelog : changelog.filter(l => l.by === logFilter);
    return `<div class="log-filters">
      ${allUsers.slice(0,7).map(u => `<button class="lf${logFilter===u?' active':''}" onclick="logFilter='${u}';renderContent()">${u==='all'?'Все':u}</button>`).join('')}
    </div>
    ${filtered.length
      ? filtered.map(l => `<div class="log-item">
          <div class="log-dot" style="background:${l.color}"></div>
          <div><div class="log-action">${l.action}</div><div class="log-meta">${l.by||'—'} · ${fdt(l.ts)}${l.roomId?' · Ном. '+l.roomId:''}</div></div>
        </div>`).join('')
      : '<div class="empty-state">Нет записей</div>'}`;
  }

  function usersHTML() {
    const userList = Object.values(users);
    const rows = userList.length
      ? userList.map(u => `
        <div class="user-row${u.active===false?' inactive':''}">
          <div class="user-avatar" style="background:${u.role==='hotel'?'#e6f1fb':u.role==='senior'?'#eeedfe':u.role==='cleaner'?'#e1f5ee':'#f5e6ff'};color:${u.role==='hotel'?'#185fa5':u.role==='senior'?'#534ab7':u.role==='cleaner'?'#0f6e56':'#4a2a8a'}">${(u.name||'?').slice(0,2).toUpperCase()}</div>
          <div class="user-info-col">
            <input type="text" id="uname-${u.id}" value="${u.name||''}" placeholder="Имя" class="user-input">
            <input type="text" id="uphone-${u.id}" value="${u.phone||''}" placeholder="WhatsApp номер" class="user-input">
            <select id="urole-${u.id}" class="user-select">
              <option value="hotel" ${u.role==='hotel'?'selected':''}>Отель</option>
              <option value="senior" ${u.role==='senior'?'selected':''}>Старший</option>
              <option value="cleaner" ${u.role==='cleaner'?'selected':''}>Уборщик</option>
            </select>
          </div>
          <div class="user-actions-col">
            <button class="adm-sv" onclick="adminSaveUser('${u.id}')">✓ Сохранить</button>
            <button class="adm-toggle${u.active===false?' restore':''}" onclick="adminToggleUser('${u.id}',${u.active===false})">${u.active===false?'Включить':'Отключить'}</button>
          </div>
        </div>`)
      .join('')
      : '<div class="empty-state">Нет пользователей</div>';

    return `<div class="adm-panel">
      <div class="adm-title">Пользователи системы</div>
      ${rows}
    </div>
    <div class="adm-panel">
      <div class="adm-title">Добавить нового сотрудника</div>
      <div class="new-user-form">
        <input type="text" id="new-name" placeholder="Имя" class="user-input">
        <input type="text" id="new-phone" placeholder="WhatsApp номер (+358...)" class="user-input">
        <input type="email" id="new-email" placeholder="Email (для входа)" class="user-input">
        <input type="password" id="new-pass" placeholder="Пароль" class="user-input">
        <select id="new-role" class="user-select">
          <option value="cleaner">Уборщик</option>
          <option value="senior">Старший</option>
          <option value="hotel">Отель</option>
        </select>
        <button class="adm-sv" onclick="adminAddUser()">+ Добавить</button>
      </div>
    </div>`;
  }

  function settingsHTML() {
    const rRows = Object.values(rooms).map(r =>
      `<div class="adm-row">
        <span class="adm-id">${r.id}</span>
        <input type="text" value="${r.name}" id="an-${r.id}" style="max-width:55px;">
        <select id="at-${r.id}">${ROOM_TYPES.map(t=>`<option value="${t}" ${r.type===t?'selected':''}>${t}</option>`).join('')}</select>
        <button class="adm-sv" onclick="adminSaveRoom('${r.id}')">✓</button>
      </div>`).join('');
    return `<div class="adm-panel">
      <div class="adm-title">Номера — название и тип</div>
      <div style="max-height:240px;overflow-y:auto;">${rRows}</div>
    </div>`;
  }

  function renderContent() {
    const mc = document.getElementById('main-content');
    if(!mc) return;
    const canClick = currentRole === 'hotel' || currentRole === 'admin';
    let html = '';
    if(mainTab === 'rooms') {
      html = `<div class="section-lbl">Все номера${canClick?' — нажми для изменения':''}</div>
        <div class="rooms-grid">${roomsGridHTML(canClick)}</div>
        <div class="legend">
          <div class="li"><div class="ld" style="background:#1a6e5a"></div>Занят</div>
          <div class="li"><div class="ld" style="background:#b85c00"></div>Выезд</div>
          <div class="li"><div class="ld" style="background:#2a7acf"></div>Въезд сегодня</div>
          <div class="li"><div class="ld" style="background:var(--border)"></div>Свободен</div>
        </div>`;
    } else if(mainTab === 'breakfast') {
      const canEdit = currentRole === 'hotel' || currentRole === 'admin';
      html = `<div class="sub-tabs">
        <button class="st${subTab==='day'?' active':''}" onclick="subTab='day';renderContent()">Сегодня</button>
        ${canEdit ? `<button class="st${subTab==='edit'?' active':''}" onclick="subTab='edit';renderContent()">Редактировать</button>` : ''}
      </div>`;
      html += subTab === 'edit' && canEdit ? bkfEditHTML() : bkfTodayHTML();
    } else if(mainTab === 'log') {
      html = `<div class="section-lbl">Журнал изменений</div>${logHTML()}`;
    } else if(mainTab === 'queue') {
      html = queueHTML() + `<div class="section-lbl" style="margin-top:.75rem;">Все номера</div><div class="rooms-grid">${roomsGridHTML(false)}</div>`;
    } else if(mainTab === 'mytasks') {
      html = myTasksHTML();
    } else if(mainTab === 'users') {
      html = usersHTML();
    } else if(mainTab === 'settings') {
      html = settingsHTML();
    }
    mc.innerHTML = html;
  }

  function renderAll() {
    updateStats();
    renderTabs();
    renderContent();
  }

  // ── Модальное окно ────────────────────────────
  function openModal(roomId) {
    const r = rooms[roomId];
    if(!r) return;
    document.getElementById('mtitle').textContent = `Номер ${r.name} — ${olabel(r)}`;
    const rLogs = changelog.filter(l => l.roomId === roomId).slice(0,4);
    const miniLog = rLogs.length
      ? rLogs.map(l => `<div class="mlog-item"><span><b>${l.by}</b> — ${l.action.replace(new RegExp(`Номер ${r.name}:? ?`),'')}</span><span>${fdt(l.ts)}</span></div>`).join('')
      : '<div style="font-size:10px;color:var(--text-muted)">Нет изменений</div>';

    document.getElementById('mcontent').innerHTML = `
      <div class="mrow"><label>Статус</label><select id="m-st" onchange="mStCh()">
        <option value="occ" ${r.occupied&&!r.checkout?'selected':''}>Занят</option>
        <option value="co" ${r.checkout?'selected':''}>Выезд сегодня</option>
        <option value="ci" ${r.checkinDate===todayStr()&&!r.occupied?'selected':''}>Ожидается въезд</option>
        <option value="emp" ${!r.occupied&&r.checkinDate!==todayStr()?'selected':''}>Свободен</option>
      </select></div>
      <div id="m-ob" style="${r.occupied||r.checkinDate===todayStr()?'':'display:none'}">
        <div class="mrow"><label>Гостей</label>
          <div class="gr"><button onclick="mChg('${roomId}',-1)">−</button><span id="gc">${r.guests||1}</span><button onclick="mChg('${roomId}',1)">+</button></div>
        </div>
        <div class="mrow-2">
          <div><label>Дата въезда</label><input type="date" id="m-cind" value="${r.checkinDate||todayStr()}"></div>
          <div><label>Время въезда</label><input type="time" id="m-cint" value="${r.checkinTime||'14:00'}"></div>
        </div>
        <div class="mrow-2">
          <div><label>Дата выезда</label><input type="date" id="m-coutd" value="${r.checkoutDate||ds(addD(new Date(),1))}"></div>
          <div><label>Время выезда</label><input type="time" id="m-coutt" value="${r.checkoutTime||'11:00'}"></div>
        </div>
      </div>
      <div class="mrow"><label>Уборка</label><select id="m-cl">
        <option value="dirty" ${r.cleanStatus==='dirty'&&!r.skipClean?'selected':''}>Требуется</option>
        <option value="cleaned" ${r.cleanStatus==='cleaned'?'selected':''}>Убрано</option>
        <option value="skip" ${r.skipClean?'selected':''}>Не убирать</option>
      </select></div>
      <div class="mact">
        <button class="btn-p" onclick="saveRoom('${roomId}')">Сохранить</button>
        <button class="btn-s" onclick="closeModal()">Отмена</button>
      </div>
      <hr class="divider">
      <div class="mlog-title">История номера</div>
      ${miniLog}`;
    document.getElementById('mbg').classList.add('open');
  }
  window.openModal = openModal;

  function mStCh() {
    const v = document.getElementById('m-st')?.value;
    const ob = document.getElementById('m-ob');
    if(ob) ob.style.display = (v==='occ'||v==='ci'||v==='co') ? '' : 'none';
  }
  window.mStCh = mStCh;

  function mChg(roomId, d) {
    const r = rooms[roomId];
    if(!r) return;
    r.guests = Math.max(1, (r.guests||1) + d);
    const el = document.getElementById('gc'); if(el) el.textContent = r.guests;
  }
  window.mChg = mChg;

  function closeModal() { document.getElementById('mbg').classList.remove('open'); }
  window.closeModal = closeModal;
  window.closeMaybe = e => { if(e.target === document.getElementById('mbg')) closeModal(); };

  // Expose to global
  window.saveRoom = saveRoom;
  window.toggleAssign = toggleAssign;
  window.confirmAssign = confirmAssign;
  window.markDone = markDone;
  window.markIssue = markIssue;
  window.saveBkfDay = saveBkfDay;
  window.toggleNoBkf = toggleNoBkf;
  window.adminSaveRoom = adminSaveRoom;
  window.adminSaveUser = adminSaveUser;
  window.adminToggleUser = adminToggleUser;
  window.adminAddUser = adminAddUser;
  window.renderContent = renderContent;

  // ── Toast уведомление ─────────────────────────
  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3500);
  }
  window.showToast = showToast;

  // ── Авторизация ───────────────────────────────
  onAuthStateChanged(auth, async user => {
    if(user) {
      currentUser = user;
      // Найти роль пользователя в базе
      const snap = await get(ref(db, 'users'));
      const allUsers = snap.val() || {};
      const found = Object.values(allUsers).find(u => u.email === user.email);
      if(found) {
        if(found.active === false) {
          await signOut(auth);
          showLoginError('Доступ отключён. Обратитесь к администратору.');
          return;
        }
        currentRole = found.role || 'cleaner';
        currentUserId = found.id;
        currentUserName = found.name;
        mainTab = {hotel:'rooms',senior:'queue',admin:'rooms',cleaner:'mytasks'}[currentRole] || 'rooms';
      } else {
        // Первый вход — создать запись
        currentRole = 'admin';
        currentUserId = user.uid;
        currentUserName = user.email;
        await set(ref(db, `users/${user.uid}`), {
          id: user.uid, name: user.email, email: user.email,
          phone: '', role: 'admin', active: true, createdAt: Date.now()
        });
        mainTab = 'rooms';
      }
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      document.getElementById('user-name-display').textContent = currentUserName;
      document.getElementById('user-role-display').textContent = ROLES[currentRole]?.label || currentRole;
      await initRooms();
      startListeners();
    } else {
      currentUser = null;
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  window.doLogin = async () => {
    const email = document.getElementById('l-email').value;
    const pass  = document.getElementById('l-pass').value;
    if(!email || !pass) { showLoginError('Введи email и пароль'); return; }
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      showLoginError('Неверный email или пароль');
    }
  };

  window.doLogout = async () => {
    await signOut(auth);
  };

  function showLoginError(msg) {
    const el = document.getElementById('login-error');
    if(el) { el.textContent = msg; el.style.display = 'block'; }
  }

  window.addEventListener('keydown', e => {
    if(e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') window.doLogin();
  });
</script>

<style>
:root {
  --green: #1a6e5a;
  --green-light: #e1f5ee;
  --orange: #b85c00;
  --orange-light: #fff3e6;
  --blue: #2a7acf;
  --blue-light: #e6f1fb;
  --purple: #4a2a8a;
  --purple-light: #f0e8ff;
  --red: #e24b4a;
  --bg: #f7f6f3;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.1);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --text-muted: #888780;
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a18;
    --surface: #242422;
    --border: rgba(255,255,255,0.1);
    --border-strong: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --text-muted: #888780;
    --green-light: #0d3328;
    --orange-light: #3a2000;
    --blue-light: #0d2340;
    --purple-light: #1e1030;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

/* ── LOGIN ── */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
.login-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 2rem 1.5rem; width: 100%; max-width: 340px; }
.login-logo { font-size: 28px; text-align: center; margin-bottom: .25rem; }
.login-title { font-size: 18px; font-weight: 500; text-align: center; margin-bottom: .25rem; }
.login-sub { font-size: 12px; color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; }
