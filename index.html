// ── Утилиты ───────────────────────────────────
const ds = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays = (s,n) => { const d=new Date(s+'T12:00:00'); d.setDate(d.getDate()+n); return ds(d); };
const todayStr = () => ds(new Date());
const fd = s => { if(!s)return'—'; const p=s.split('-'); return`${p[2]}.${p[1]}`; };
const fdt = (ts,l='ru') => {
  if(!ts)return'';
  const d=new Date(ts), h=String(d.getHours()).padStart(2,'0'), m=String(d.getMinutes()).padStart(2,'0');
  const isToday = d.toDateString()===new Date().toDateString();
  return isToday ? `${TR[l].today} ${h}:${m}` : `${d.getDate()}.${d.getMonth()+1} ${h}:${m}`;
};
const dayName = (s,l='ru') => TR[l].days[new Date(s+'T12:00:00').getDay()];

// ── WhatsApp ──────────────────────────────────
async function notify(fromRole, msg) {
  const roles = NOTIFY[fromRole]||[];
  if(!roles.length||!WORKER_URL) return;
  const phones = Object.values(users)
    .filter(u => roles.includes(u.role) && u.phone && u.active!==false)
    .map(u => u.phone);
  if(!phones.length) return;
  try {
    await fetch(WORKER_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phones, message:`${ICON[fromRole]||''} ${me.name}: ${msg}` })
    });
  } catch(e){ console.warn('WA',e); }
}

async function addLog(objId, action, color) {
  await push(ref(db,'changelog'), { roomId:objId||null, action, by:me.name||'?', byRole:me.role, ts:Date.now(), color:color||'#888' });
}

// ── Тип объекта — функции ─────────────────────
function getType(typeId) { return objTypes[typeId]||{}; }
function typeName(typeId) { return getType(typeId).name || typeId || ''; }
function hasFeat(typeId, feat) {
  const tp = getType(typeId);
  if(!tp.features) return false;
  return tp.features[feat] === true;
}

// ── Статус объекта ────────────────────────────
function ostatus(o) {
  if(!o) return 'emp';
  if(o.checkout) return 'co';
  if(o.checkinDate===todayStr()&&!o.occupied) return 'ci';
  if(o.occupied) return 'occ';
  return 'emp';
}
function olabel(o) {
  const s = ostatus(o);
  if(s==='co') return t('checkout');
  if(s==='ci') return t('checkin_today');
  if(s==='occ') return t('occupied');
  return t('vacant');
}
function priLabel(o) {
  if(!o) return null;
  if(o.checkout) return t('urgent');
  if(o.checkinDate===todayStr()&&!o.occupied) return `${t('checkin_at')} ${o.checkinTime||''}`;
  return null;
}
function getBkf(objId, dateS) {
  return bkfSched[`${objId}_${dateS}`] || { slotId:null, noBkf:false };
}

// Посчитать завтраки на день
function calcBkfDay(dateS) {
  const map = {}; // slotId -> [{obj, slotLabel}]
  let total = 0;
  Object.values(objects).forEach(o => {
    if(!hasFeat(o.typeId,'breakfast')) return;
    if(!o.occupied||!o.checkinDate||!o.checkoutDate) return;
    if(dateS<o.checkinDate||dateS>o.checkoutDate) return;
    const b = getBkf(o.id, dateS);
    if(b.noBkf) return;
    const slotId = b.slotId || 'default';
    const slot = bkfSlots[slotId];
    const slotLabel = slot ? `${slot.from}–${slot.to}` : (b.customTime||'08:00');
    total += (o.guests||1);
    if(!map[slotLabel]) map[slotLabel]=[];
    map[slotLabel].push(o);
  });
  return { total, map };
}

function sortedObjects() {
  return Object.values(objects).sort((a,b)=>{
    const p = o => { const s=ostatus(o); return s==='co'?0:s==='ci'?1:s==='occ'?2:3; };
    return p(a)-p(b);
  });
}

// ── Действия — Объект ─────────────────────────
async function saveObject(objId) {
  const o = objects[objId]; if(!o) return;
  const prevSt = ostatus(o);
  const get$ = id => document.getElementById(id);

  const v      = get$('m-st')?.value;
  const cinD   = get$('m-cind')?.value;
  const cinT   = get$('m-cint')?.value;
  const coutD  = get$('m-coutd')?.value;
  const coutT  = get$('m-coutt')?.value;
  const cl     = get$('m-cl')?.value;
  const bkfN   = get$('m-bkf')?.value;
  const bkfS   = get$('m-bkfslot')?.value;
  const guests = parseInt(get$('gc')?.textContent)||o.guests||1;

  const upd = { guests, lastChangedBy:me.name, lastChangedAt:Date.now() };
  if(v){ upd.occupied=(v==='occ'||v==='co'); upd.checkout=(v==='co'); }
  if(v==='emp'){ upd.checkinDate=null;upd.checkoutDate=null;upd.occupied=false;upd.checkout=false;upd.bkfNeeded=false; }
  if(v==='ci'){ upd.checkinDate=todayStr();upd.occupied=false;upd.checkout=false; }
  if(cinD&&v!=='emp') upd.checkinDate=cinD;
  if(cinT) upd.checkinTime=cinT;
  if(coutD&&v!=='emp') upd.checkoutDate=coutD;
  if(coutT) upd.checkoutTime=coutT;
  if(bkfN) upd.bkfNeeded=(bkfN==='yes');
  if(bkfS) upd.defaultSlotId=bkfS;
  if(cl){ upd.skipClean=(cl==='skip'); upd.cleanStatus=cl==='skip'?'dirty':cl; }

  await update(ref(db,`objects/${objId}`), upd);

  const merged = {...o,...upd};
  const newSt = ostatus(merged);
  const changes = [];
  if(newSt!==prevSt) changes.push(`${olabel(merged)}`);
  if(upd.checkinDate)  changes.push(`${t('checkin_date')}: ${fd(upd.checkinDate)} ${upd.checkinTime||''}`);
  if(upd.checkoutDate) changes.push(`${t('checkout_date')}: ${fd(upd.checkoutDate)} ${upd.checkoutTime||''}`);
  if(cl==='cleaned') changes.push(t('cleaned'));

  if(changes.length) {
    const msg = `${o.name}: ${changes.join(' · ')}`;
    await addLog(objId, msg, '#1a6e5a');
    await notify(me.role, msg);
  }
  // Добавить в очередь
  if(hasFeat(o.typeId,'cleaning')) {
    if(merged.checkout||(!merged.occupied&&prevSt==='occ')) await addToQueue(objId,'clean');
  }
  if(hasFeat(o.typeId,'breakfast')&&merged.occupied&&!merged.checkout&&merged.bkfNeeded) {
    await addToQueue(objId,'bkf');
    // Создать расписание завтраков
    if(merged.checkinDate&&merged.checkoutDate) {
      const bkfUpd={};
      let cur=merged.checkinDate;
      while(cur<=merged.checkoutDate) {
        const k=`${objId}_${cur}`;
        if(!bkfSched[k]) bkfUpd[k]={ slotId:merged.defaultSlotId||null, noBkf:false, customTime:'08:00' };
        cur=addDays(cur,1);
      }
      if(Object.keys(bkfUpd).length) await update(ref(db,'bkfSched'),bkfUpd);
    }
  }
  closeModal();
}
window.saveObject=saveObject;

async function addToQueue(objId,type) {
  if(!Object.values(queue).find(q=>q.roomId===objId&&q.type===type&&!q.done))
    await push(ref(db,'queue'),{roomId:objId,type,assignedTo:[],done:false,createdAt:Date.now()});
}

async function toggleAssign(taskId,userId) {
  const task=queue[taskId]; if(!task)return;
  const a=[...(task.assignedTo||[])];
  const idx=a.indexOf(userId);
  if(idx>=0) a.splice(idx,1); else a.push(userId);
  await update(ref(db,`queue/${taskId}`),{assignedTo:a});
}
window.toggleAssign=toggleAssign;

async function confirmAssign(taskId) {
  const task=queue[taskId]; if(!task||(task.assignedTo||[]).length===0)return;
  const o=objects[task.roomId];
  const names=(task.assignedTo||[]).map(uid=>{const u=Object.values(users).find(u=>u.id===uid);return u?.name||'';}).filter(Boolean);
  const tl=task.type==='clean'?t('cleaning'):t('bkf');
  const msg=`${o?.name}: ${t('assign')} → ${names.join(' + ')} (${tl})`;
  await addLog(task.roomId,msg,'#6a4ecf');
  // Уведомить каждого уборщика
  for(let i=0;i<task.assignedTo.length;i++){
    const uid=task.assignedTo[i];
    const u=Object.values(users).find(u=>u.id===uid);
    if(u?.phone&&WORKER_URL){
      const others=names.filter((_,j)=>j!==i);
      const m=`👔 ${me.name}: ${o?.name}: ${tl}${others.length?' · '+t('together')+' '+others.join(', '):''}${o?.checkoutDate?' · '+fd(o.checkoutDate)+' '+(o.checkoutTime||''):''}`;
      try{ await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phones:[u.phone],message:m})}); }catch(e){}
    }
  }
  await notify('senior',msg);
  showToast(t('saved'));
}
window.confirmAssign=confirmAssign;

async function markDone(taskId,cleanerId) {
  const task=queue[taskId]; if(!task)return;
  const o=objects[task.roomId];
  const u=Object.values(users).find(u=>u.id===cleanerId);
  await update(ref(db,`queue/${taskId}`),{done:true,doneBy:cleanerId,doneAt:Date.now()});
  if(task.type==='clean') await update(ref(db,`objects/${task.roomId}`),{cleanStatus:'cleaned',lastChangedBy:u?.name,lastChangedAt:Date.now()});
  const lbl=task.type==='clean'?t('cleaning'):t('bkf');
  const msg=`${o?.name}: ✓ ${lbl} (${u?.name||''})`;
  await addLog(task.roomId,msg,'#2a7acf');
  await notify('cleaner',msg);
  renderAll();
}
window.markDone=markDone;

async function markIssue(taskId,cleanerId) {
  const task=queue[taskId]; if(!task)return;
  const o=objects[task.roomId];
  const u=Object.values(users).find(u=>u.id===cleanerId);
  const msg=`${o?.name}: ⚠ ${t('problem')} (${u?.name||''})`;
  await addLog(task.roomId,msg,'#e24b4a');
  await notify('cleaner',msg);
}
window.markIssue=markIssue;

async function saveBkfDay(objId,dateS) {
  const slotEl=document.getElementById(`bs-${objId}-${dateS}`);
  const timeEl=document.getElementById(`bt-${objId}-${dateS}`);
  const cur=getBkf(objId,dateS);
  const upd={ slotId:slotEl?.value||null, customTime:timeEl?.value||cur.customTime||'08:00', noBkf:cur.noBkf||false };
  await update(ref(db,`bkfSched/${objId}_${dateS}`),upd);
  const o=objects[objId];
  const msg=`${o?.name}: ${t('bkf_time')} ${fd(dateS)} → ${upd.customTime}`;
  await addLog(objId,msg,'#b85c00');
  await notify(me.role,msg);
  const ok=document.getElementById(`ok-${objId}-${dateS}`);
  if(ok){ok.style.display='inline';setTimeout(()=>ok.style.display='none',2000);}
}
window.saveBkfDay=saveBkfDay;

async function toggleNoBkf(objId,dateS) {
  const cur=getBkf(objId,dateS);
  await update(ref(db,`bkfSched/${objId}_${dateS}`),{noBkf:!cur.noBkf});
  const o=objects[objId];
  const msg=`${o?.name}: ${t('bkf')} ${fd(dateS)} — ${!cur.noBkf?t('skip'):t('restored')}`;
  await addLog(objId,msg,'#b85c00');
  await notify(me.role,msg);
}
window.toggleNoBkf=toggleNoBkf;

async function saveBkfSlot() {
  const nameEl=document.getElementById('bs-name');
  const fromEl=document.getElementById('bs-from');
  const toEl  =document.getElementById('bs-to');
  if(!nameEl?.value||!fromEl?.value){showToast(t('fill_req'));return;}

function openModal(objId) {
  const o=objects[objId]; if(!o)return;
  const tp=getType(o.typeId);
  const showOcc     = hasFeat(o.typeId,'occupied');
  const showGuests  = hasFeat(o.typeId,'guests');
  const showBkf     = hasFeat(o.typeId,'breakfast');
  const showClean   = hasFeat(o.typeId,'cleaning');

  document.getElementById('mtitle').textContent=`${o.name} — ${typeName(o.typeId)}`;
  const rLogs=changelog.filter(l=>l.roomId===objId).slice(0,4);
  const miniLog=rLogs.length
    ?rLogs.map(l=>`<div class="mli"><span><b>${l.by}</b> — ${l.action.replace(new RegExp(o.name+':? ?'),'')}</span><span>${fdt(l.ts,lang)}</span></div>`).join('')
    :`<div class="mli muted">${t('no_changes')}</div>`;

  const slotsOpts=Object.values(bkfSlots).map(s=>`<option value="${s.id}" ${o.defaultSlotId===s.id?'selected':''}>${s.name} (${s.from}–${s.to})</option>`).join('');

  document.getElementById('mcontent').innerHTML=`
    ${showOcc?`<div class="mrow"><label>${t('occupied')}</label>
      <select id="m-st" onchange="mStCh()">
        <option value="occ" ${o.occupied&&!o.checkout?'selected':''}>${t('occupied')}</option>
        <option value="co"  ${o.checkout?'selected':''}>${t('checkout')}</option>
        <option value="ci"  ${o.checkinDate===todayStr()&&!o.occupied?'selected':''}>${t('checkin_today')}</option>
        <option value="emp" ${!o.occupied&&o.checkinDate!==todayStr()?'selected':''}>${t('vacant')}</option>
      </select></div>`:''}
    <div id="m-ob" style="${(showOcc&&(o.occupied||o.checkinDate===todayStr()))||!showOcc?'':'display:none'}">
      ${showGuests?`<div class="mrow"><label>${t('guests')}</label>
        <div class="gr"><button onclick="mChg('${objId}',-1)">−</button><span id="gc">${o.guests||1}</span><button onclick="mChg('${objId}',1)">+</button></div>
      </div>
      <div class="mrow-2">
        <div><label>${t('checkin_date')}</label><input type="date" id="m-cind" value="${o.checkinDate||todayStr()}"></div>
        <div><label>${t('checkin_time')}</label><input type="time" id="m-cint" value="${o.checkinTime||'14:00'}"></div>
      </div>
      <div class="mrow-2">
        <div><label>${t('checkout_date')}</label><input type="date" id="m-coutd" value="${o.checkoutDate||addDays(todayStr(),1)}"></div>
        <div><label>${t('checkout_time')}</label><input type="time" id="m-coutt" value="${o.checkoutTime||'11:00'}"></div>
      </div>`:''}
      ${showBkf?`<div class="mrow"><label>${t('bkf_yes')}</label>
        <select id="m-bkf" onchange="mBkfCh()">
          <option value="yes" ${o.bkfNeeded!==false?'selected':''}>${t('bkf_yes')}</option>
          <option value="no"  ${o.bkfNeeded===false?'selected':''}>${t('bkf_no')}</option>
        </select></div>
      <div id="m-bkfslot-row" style="${o.bkfNeeded!==false?'':'display:none'}">
        <div class="mrow"><label>${t('bkf_time')}</label>
          <select id="m-bkfslot">
            <option value="">${t('bkf_time')}...</option>
            ${slotsOpts}
          </select>
        </div>
      </div>`:''}
    </div>
    ${showClean?`<div class="mrow"><label>${t('cleaning')}</label>
      <select id="m-cl">
        <option value="dirty"   ${o.cleanStatus==='dirty'&&!o.skipClean?'selected':''}>${t('need_clean')}</option>
        <option value="cleaned" ${o.cleanStatus==='cleaned'?'selected':''}>${t('cleaned')}</option>
        <option value="skip"    ${o.skipClean?'selected':''}>${t('no_clean')}</option>
      </select></div>`:''}
    <div class="mact">
      <button class="btn-p" onclick="saveObject('${objId}')">${t('save')}</button>
      <button class="btn-s" onclick="closeModal()">${t('cancel')}</button>
    </div>
    <hr class="divider">

function roomsGridHTML(clickable) {
  const objs=sortedObjects();
  if(!objs.length) return `<div class="empty-state">${t('no_objs')}</div>`;
  return objs.map(o=>{
    const st=ostatus(o);
    const last=changelog.find(l=>l.roomId===o.id);
    const aQ=Object.values(queue).find(q=>q.roomId===o.id&&!q.done&&(q.assignedTo||[]).length>0);
    const aNames=aQ?(aQ.assignedTo||[]).map(uid=>{const u=Object.values(users).find(u=>u.id===uid);return u?.name||'';}).filter(Boolean).join(', '):null;
    const myT=me.role==='cleaner'?Object.values(queue).find(q=>q.roomId===o.id&&(q.assignedTo||[]).includes(me.id)&&!q.done):null;
    const pri=priLabel(o);
    const todBkf=o.occupied&&!o.checkout?getBkf(o.id,todayStr()):null;
    const slot=todBkf?.slotId?bkfSlots[todBkf.slotId]:null;
    const bkfLabel=slot?`${slot.from}`:todBkf?.customTime||'';
    return`<div class="rc ${st}${clickable?' clickable':''}" ${clickable?`onclick="openModal('${o.id}')"`:''}>
      <div class="rc-num">${o.name}<span class="rc-type">${typeName(o.typeId)}</span></div>
      <div class="rc-st ${st}">${olabel(o)}</div>
      ${o.guests>0&&hasFeat(o.typeId,'guests')?`<div class="rc-ln">${o.guests} ${t('guests').toLowerCase()}</div>`:''}
      ${o.checkinDate&&o.occupied?`<div class="rc-ln green">↓ ${fd(o.checkinDate)} ${o.checkinTime||''}</div>`:''}
      ${o.checkoutDate&&o.occupied?`<div class="rc-ln${o.checkout?' alert':''}">↑ ${fd(o.checkoutDate)} ${o.checkoutTime||''}</div>`:''}
      ${hasFeat(o.typeId,'breakfast')&&o.occupied&&!o.checkout?(todBkf&&!todBkf.noBkf?`<div class="rc-ln alert">☕ ${bkfLabel}</div>`:`<div class="rc-ln muted">☕ ${t('without_bkf')}</div>`):''}
      ${pri?`<div class="rc-ln alert sml">${pri}</div>`:''}
      ${aNames?`<div class="rc-ln blue">→ ${aNames}</div>`:''}
      ${myT?`<div class="my-badge">${t('mytasks')}</div>`:''}
      ${last?`<div class="rc-who">${last.by} · ${fdt(last.ts,lang)}</div>`:''}
      <div class="cb ${o.skipClean?'skip':o.cleanStatus}"></div>
    </div>`;
  }).join('');
}

function bkfTodayHTML() {
  const viewDs=addDays(todayStr(),dayOffset-1);
  // fix: addDays adds to today, but we need offset from today
  const baseDate=new Date(); baseDate.setDate(baseDate.getDate()+dayOffset);
  const viewDsFixed=ds(baseDate);
  const{total,map}=calcBkfDay(viewDsFixed);
  const dayLbl=dayOffset===0?t('today'):dayOffset===1?t('tomorrow'):dayOffset===-1?t('yesterday'):`${dayName(viewDsFixed,lang)}, ${fd(viewDsFixed)}`;
  const keys=Object.keys(map).sort();
  const groups=keys.map(k=>{
    const os=map[k]; const cnt=os.reduce((s,o)=>s+(o.guests||1),0);
    return`<div class="tg">
      <div class="tg-head"><div><div class="tg-time">${k}</div><div class="tg-sub">${os.length} ${t('rooms').toLowerCase()}</div></div><div class="tg-cnt">${cnt} ${t('portions')}</div></div>
      <div class="tg-pills">${os.map(o=>`<span class="rpill">${o.name} ×${o.guests||1}</span>`).join('')}</div>
    </div>`;
  }).join('')||`<div class="empty-state">${t('no_queue')}</div>`;
  return`<div class="day-nav">
    <button onclick="dayOffset--;renderContent()">‹</button>
    <div><div class="day-lbl">${dayLbl}</div><div class="day-sub-l">${fd(viewDsFixed)}</div></div>
    <button onclick="dayOffset++;renderContent()">›</button>
  </div>
  <div class="bkf-sum">
    <div><div class="bkf-big">${total}</div><div class="bkf-sub">${t('breakfast')} · ${keys.length} слотов</div></div>
    <div class="muted sml">${Object.values(map).reduce((s,a)=>s+a.length,0)} ${t('rooms').toLowerCase()}</div>
  </div>
  ${groups}`;
}

function bkfEditHTML() {
  const canEdit=me.role==='hotel'||me.role==='admin';
  const activeObjs=Object.values(objects).filter(o=>hasFeat(o.typeId,'breakfast')&&o.occupied&&o.checkinDate&&o.checkoutDate);
  if(!activeObjs.length) return `<div class="empty-state">${t('no_objs')}</div>`;
  const slotsOpts=Object.values(bkfSlots).map(s=>`<option value="${s.id}">${s.name} (${s.from}–${s.to})</option>`).join('');
  return activeObjs.map(o=>{
    const days=[];
    let cur=o.checkinDate;
    while(cur<=o.checkoutDate){days.push(cur);cur=addDays(cur,1);}
    const daysHtml=days.map(dstr=>{
      const b=getBkf(o.id,dstr); const tod=dstr===todayStr();
      const slot=b.slotId?bkfSlots[b.slotId]:null;
      return`<div class="rbk-day${tod?' tod':''}">
        <span class="rbk-date">${tod?'★ ':''}${dayName(dstr,lang)} ${fd(dstr)}</span>
        ${b.noBkf
          ?`<span class="bskip">${t('skip')}</span>`
          :canEdit
            ?`<select id="bs-${o.id}-${dstr}" class="ti-sel"><option value="">${t('bkf_time')}...</option>${slotsOpts}</select>
              <input class="ti" type="time" id="bt-${o.id}-${dstr}" value="${b.customTime||'08:00'}">`
            :`<span class="btime">${slot?slot.from:b.customTime||''}</span>`
        }
        ${canEdit?`<button class="nbtn${b.noBkf?' on':''}" onclick="toggleNoBkf('${o.id}','${dstr}')">${b.noBkf?t('restore_bkf'):t('skip_bkf')}</button>`:''}
        ${canEdit&&!b.noBkf?`<button class="sv-btn" onclick="saveBkfDay('${o.id}','${dstr}')">✓</button>`:''}
        <span class="ok-lbl" id="ok-${o.id}-${dstr}" style="display:none">✓</span>
      </div>`;
    }).join('');
    return`<div class="rbk">
      <div class="rbk-top"><div class="rbk-room">${o.name} <span class="rbk-type">${typeName(o.typeId)}</span></div><div class="rbk-meta">${o.guests||1} ${t('guests').toLowerCase()} · ${fd(o.checkinDate)}–${fd(o.checkoutDate)}</div></div>
      ${daysHtml}
    </div>`;
  }).join('');
}

function queueHTML() {
  const items=Object.entries(queue).filter(([,q])=>!q.done)
    .sort(([,a],[,b])=>{
      const p=id=>{const o=objects[id];const s=ostatus(o);return s==='co'?0:s==='ci'?1:2;};
      return p(a.roomId)-p(b.roomId);
    });
  if(!items.length) return `<div class="queue-panel"><div class="queue-title">${t('tasks')} <span class="qbadge">0</span></div><div class="empty-state">${t('no_queue')}</div></div>`;
  const cleaners=Object.values(users).filter(u=>u.role==='cleaner'&&u.active!==false);
  const rows=items.map(([tid,task])=>{
    const o=objects[task.roomId];
    const tl=task.type==='clean'?t('cleaning'):t('bkf');
    const pri=o?priLabel(o):'';
    const aNames=(task.assignedTo||[]).map(uid=>{const u=cleaners.find(u=>u.id===uid);return u?.name||'';}).filter(Boolean);
    const chips=cleaners.map(u=>{
      const sel=(task.assignedTo||[]).includes(u.id);
      return`<div class="cl-chip${sel?' selected':''}" onclick="toggleAssign('${tid}','${u.id}')"><span>${sel?'✓':''}</span>${u.name}</div>`;
    }).join('');
    return`<div class="qi">
      <div class="qi-top">
        <div class="qi-room">${o?.name||task.roomId} <span class="qi-tl">${typeName(o?.typeId)}</span></div>
        <div class="qi-type">${tl}${o?.checkoutDate?' · '+fd(o.checkoutDate)+' '+(o.checkoutTime||''):''}</div>
        ${pri?`<div class="qi-pri">${pri}</div>`:''}
        ${aNames.length?`<div class="qi-asgnd">→ ${aNames.join(' + ')}</div>`:''}
      </div>
      <div class="chips">${chips||`<div class="muted sml">${t('select_cleaner')}</div>`}</div>
      <div class="assign-bar">
        <button class="abtn" onclick="confirmAssign('${tid}')" ${(task.assignedTo||[]).length===0?'disabled':''}>
          ${(task.assignedTo||[]).length>0?`${t('assign')} (${task.assignedTo.length})`:t('select_cleaner')}
        </button>
      </div>
    </div>`;
  }).join('');
  return`<div class="queue-panel"><div class="queue-title">${t('tasks')} <span class="qbadge">${items.length}</span></div>${rows}</div>`;
}

function myTasksHTML() {
  const myTasks=Object.entries(queue).filter(([,q])=>(q.assignedTo||[]).includes(me.id)&&!q.done);
  if(!myTasks.length) return `<div class="empty-state">${t('no_tasks')}</div>`;
  return myTasks.map(([tid,task])=>{
    const o=objects[task.roomId];
    const tc=task.type==='bkf'?'bkf':'clean';
    const tl=task.type==='clean'?t('cleaning'):t('bkf');
    const pri=o?priLabel(o):'';
    const others=(task.assignedTo||[]).filter(id=>id!==me.id).map(uid=>{const u=Object.values(users).find(u=>u.id===uid);return u?.name||'';}).filter(Boolean);
    const todBkf=task.type==='bkf'&&o?getBkf(o.id,todayStr()):null;
    const slot=todBkf?.slotId?bkfSlots[todBkf.slotId]:null;
    const bkfTime=slot?`${slot.from}–${slot.to}`:todBkf?.customTime||'—';
    const detail=task.type==='clean'
      ?`${t('cleaning')}: ${o?.name}${o?.floor?' ('+o.floor+' '+t('floor')+'.)':''}`
      :`${t('bkf')}: ${bkfTime} · ${o?.guests||1} ${t('portions')} → ${o?.name}`;
    return`<div class="task-card">
      <div class="task-top"><div class="task-room">${o?.name||task.roomId}</div><span class="tbadge ${tc}">${tl}</span></div>
      ${pri?`<div class="task-pri">${pri}</div>`:''}
      ${others.length?`<div class="task-tog">${t('together')} ${others.join(', ')}</div>`:''}
      <div class="task-det">${detail}${o?.checkoutDate?`<br>↑ ${fd(o.checkoutDate)} ${o.checkoutTime||''}`:''}</div>
      <div class="tact">
        <button class="done-btn" onclick="markDone('${tid}','${me.id}')">${t('done')}</button>
        <button class="issue-btn" onclick="markIssue('${tid}','${me.id}')">${t('problem')}</button>
      </div>
    </div>`;
  }).join('');
}

    <button class="adm-sv" onclick="saveObjSettings('${o.id}')">✓</button>

  return`

    <div class="adm-title">${t('obj_types')}</div>

    <div class="new-form" style="margin-top:10px;">

        <label><input type="checkbox" id="nt-clean"  checked> ${t('feat_clean')}</label>
        <label><input type="checkbox" id="nt-occ"    checked> ${t('feat_occupied')}</label>

    <div style="max-height:240px;overflow-y:auto;">${objRows}</div>
    <div class="new-form" style="margin-top:10px;">
      <input type="text" id="no-name"  placeholder="${t('obj_name')}" class="uin">
      <select id="no-type" class="usel">${typeList.length?typeList.map(tp=>`<option value="${tp.id}">${tp.name}</option>`).join(''):`<option value="">— ${t('no_types')} —</option>`}</select>

function renderContent() {
  const mc=document.getElementById('main-content'); if(!mc)return;
  const canClick=me.role==='hotel'||me.role==='admin';
  let html='';
  if(mainTab==='rooms'){
    html=`<div class="section-lbl">${t('rooms')}</div>
      <div class="rooms-grid">${roomsGridHTML(canClick)}</div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:#1a6e5a"></div>${t('occupied')}</div>
        <div class="li"><div class="ld" style="background:#b85c00"></div>${t('checkout')}</div>
        <div class="li"><div class="ld" style="background:#2a7acf"></div>${t('checkin_today')}</div>
        <div class="li"><div class="ld" style="background:var(--border)"></div>${t('vacant')}</div>
      </div>`;
  } else if(mainTab==='breakfast'){
    const canEdit=me.role==='hotel'||me.role==='admin';
    html=`<div class="sub-tabs">
      <button class="st${subTab==='day'?' active':''}" onclick="subTab='day';renderContent()">${t('today')}</button>
      ${canEdit?`<button class="st${subTab==='edit'?' active':''}" onclick="subTab='edit';renderContent()">${t('edit_bkf')}</button>`:''}
    </div>${subTab==='edit'&&canEdit?bkfEditHTML():bkfTodayHTML()}`;
  } else if(mainTab==='log'){
    html=`<div class="section-lbl">${t('log')}</div>${logHTML()}`;
  } else if(mainTab==='queue'){
    html=queueHTML()+`<div class="section-lbl" style="margin-top:.75rem;">${t('rooms')}</div><div class="rooms-grid">${roomsGridHTML(false)}</div>`;
  } else if(mainTab==='mytasks'){
    html=myTasksHTML();
  } else if(mainTab==='users'){
    html=usersHTML();
  } else if(mainTab==='settings'){
    html=settingsHTML();
  }
  mc.innerHTML=html;
}

function renderAll(){ updateStats(); renderTabs(); renderContent(); }

// ── Авторизация ───────────────────────────────
onAuthStateChanged(auth, async user=>{
  if(user){
    const snap=await get(ref(db,'users'));
    const allU=snap.val()||{};
    const found=Object.values(allU).find(u=>u.email===user.email);
    if(found){
      if(found.active===false){ await signOut(auth); showLoginError(TR.ru.access_off); return; }
      me={role:found.role||'cleaner',id:found.id,name:found.name};
    } else {
      me={role:'admin',id:user.uid,name:user.email};
      await set(ref(db,`users/${user.uid}`),{id:user.uid,name:user.email,email:user.email,phone:'',role:'admin',active:true,createdAt:Date.now()});
    }
    lang = me.role==='hotel' ? 'fi' : 'ru';
    mainTab={hotel:'rooms',senior:'queue',admin:'rooms',cleaner:'mytasks'}[me.role]||'rooms';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('u-name').textContent=me.name;
    document.getElementById('u-role').textContent=(TR[lang]||TR.ru)[`role_${me.role}`]||me.role;
    document.getElementById('logout-btn').textContent=t('logout');
    startListeners();
  } else {
    me={role:null,id:null,name:null};
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

window.doLogin=async()=>{
  const e=document.getElementById('l-email')?.value;
  const p=document.getElementById('l-pass')?.value;
  if(!e||!p){showLoginError('Email + пароль');return;}
  try{ await signInWithEmailAndPassword(auth,e,p); }
  catch(err){ showLoginError(TR.ru.wrong_pass); }
};
window.doLogout=async()=>signOut(auth);
window.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen')?.style.display!=='none') window.doLogin();
});
function showLoginError(msg){ const el=document.getElementById('login-error'); if(el){el.textContent=msg;el.style.display='block';} }
function showToast(msg){
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},3000);
}
window.showToast=showToast;
</script>

<style>
:root{
  --green:#1a6e5a;--gl:#e1f5ee;--orange:#b85c00;--ol:#fff3e6;
  --blue:#2a7acf;--bl:#e6f1fb;--purple:#4a2a8a;--red:#e24b4a;
  --bg:#f7f6f3;--sur:#fff;--border:rgba(0,0,0,.1);--borders:rgba(0,0,0,.18);

@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--sur:#242422;--border:rgba(255,255,255,.1);--borders:rgba(255,255,255,.18);--text:#f0ede8;--gl:#0d3328;--ol:#3a2000;--bl:#0d2340;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

input,select,button,textarea{font-family:inherit;font-size:13px;}
select,input[type=date],input[type=time],input[type=text],input[type=email],input[type=password]{
  padding:6px 8px;border:0.5px solid var(--borders);border-radius:var(--rs);background:var(--bg);color:var(--text);width:100%;
}
button{cursor:pointer;}
.muted{color:var(--text-muted)!important;} .sml{font-size:10px!important;}

/* LOGIN */

.lcard input{display:block;margin-bottom:.75rem;}
.lbtn{display:block;width:100%;padding:11px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;font-size:14px;font-weight:500;}
.lbtn:hover{background:#155a49;}
#login-error{font-size:12px;color:var(--red);margin-top:.75rem;display:none;text-align:center;}

/* APP */
#app-screen{display:none;max-width:600px;margin:0 auto;padding:.75rem .75rem 5rem;}
.appbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.abl{display:flex;flex-direction:column;}
.abn{font-size:13px;font-weight:500;}
.abr{font-size:10px;color:var(--text-muted);}
.logout-btn{font-size:11px;padding:4px 10px;border-radius:var(--rs);border:0.5px solid var(--border);background:transparent;color:var(--text-muted);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:5px;margin-bottom:.6rem;}
.stat{background:var(--sur);border:0.5px solid var(--border);border-radius:var(--rs);padding:7px 8px;text-align:center;}
.stat-num{font-size:18px;font-weight:500;}
.stat-lbl{font-size:9px;color:var(--text-muted);margin-top:1px;}
.n-occ{color:var(--green);}.n-emp{color:var(--text-muted);}.n-need{color:var(--orange);}.n-done{color:var(--blue);}

/* BKF BAR */
.bkf-bar{background:var(--sur);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 13px;margin-bottom:.6rem;}

.bkf-times{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.bslot{font-size:10px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rs);padding:2px 7px;color:var(--text-muted);}
.bslot b{color:var(--orange);font-weight:500;}

/* TABS */
.main-tabs{display:flex;gap:4px;margin-bottom:.6rem;flex-wrap:wrap;}
.mt{padding:5px 11px;border-radius:var(--rs);border:0.5px solid var(--border);background:var(--sur);color:var(--text-muted);font-size:12px;transition:all .15s;}
.mt.active{background:var(--green);border-color:var(--green);color:#fff;}
.mt:hover:not(.active){background:var(--bg);}

.rbk-date{min-width:80px;color:var(--text-muted);font-size:10px;}
.rbk-day.tod .rbk-date{color:var(--orange);font-weight:500;}
.ti{padding:3px 5px;border:0.5px solid var(--border);border-radius:var(--rs);background:var(--sur);color:var(--text);font-size:11px;width:72px;}
.ti-sel{font-size:10px;padding:3px 5px;width:auto;max-width:120px;}
.nbtn{font-size:10px;padding:2px 6px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text-muted);white-space:nowrap;}
.nbtn.on{background:var(--ol);border-color:#f5c476;color:var(--orange);}
.sv-btn{font-size:10px;padding:2px 7px;border-radius:var(--rs);border:none;background:var(--orange);color:#fff;}
.ok-lbl{font-size:10px;color:var(--green);}
.bskip{font-size:10px;color:var(--text-muted);font-style:italic;}
.btime{font-size:11px;font-weight:500;}

/* LOG */
.log-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.lf{padding:2px 8px;border-radius:20px;border:0.5px solid var(--border);font-size:10px;background:var(--sur);color:var(--text-muted);}
.lf.active{background:var(--bg);border-color:var(--borders);color:var(--text);}
.log-item{display:flex;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.log-action{font-size:11px;}
.log-meta{font-size:10px;color:var(--text-muted);margin-top:1px;}

/* ADMIN */
.adm-panel{border:0.5px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:.6rem;background:var(--sur);}
.adm-title{font-size:12px;font-weight:500;color:var(--purple);margin-bottom:9px;}
.adm-row{display:flex;align-items:center;gap:5px;padding:5px 0;border-bottom:0.5px solid var(--border);flex-wrap:wrap;}
.adm-row:last-child{border-bottom:none;}
.adm-sv{font-size:10px;padding:3px 8px;border-radius:var(--rs);border:none;background:var(--purple);color:#fff;flex-shrink:0;}
.adm-del{font-size:10px;padding:3px 7px;border-radius:var(--rs);border:0.5px solid #f09595;background:transparent;color:#a32d2d;flex-shrink:0;}
.feat-checks{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;}
.feat-checks label{display:flex;align-items:center;gap:3px;cursor:pointer;}
.user-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.user-row:last-child{border-bottom:none;}
.user-row.inactive{opacity:.5;}
.user-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:2px;}
.user-col{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
.user-act{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.uin{font-size:11px;}
.usel{font-size:11px;}
.adm-tog{font-size:10px;padding:3px 8px;border-radius:var(--rs);border:0.5px solid #f09595;background:transparent;color:#a32d2d;white-space:nowrap;}
.adm-tog.r{border-color:#5dcaa5;color:var(--green);}
.new-form{display:flex;flex-direction:column;gap:6px;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--sur);border-radius:var(--r);border:0.5px solid var(--border);padding:1.1rem;width:305px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:14px;font-weight:500;margin-bottom:10px;}
.mrow{margin-bottom:8px;}
.mrow label{font-size:10px;color:var(--text-muted);display:block;margin-bottom:2px;}
.mrow-2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.gr{display:flex;align-items:center;gap:6px;}
.gr button{width:26px;height:26px;border:0.5px solid var(--border);border-radius:var(--rs);background:var(--bg);font-size:13px;color:var(--text);}
.gr span{min-width:18px;text-align:center;font-size:13px;font-weight:500;}
.mact{display:flex;gap:6px;margin-top:11px;}
.btn-p{flex:1;padding:7px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;font-size:13px;}
.btn-s{padding:7px 12px;border-radius:var(--rs);border:0.5px solid var(--border);background:transparent;font-size:13px;color:var(--text);}
.divider{border:none;border-top:0.5px solid var(--border);margin:9px 0;}
.mlog-title{font-size:10px;font-weight:500;color:var(--text-muted);margin-bottom:4px;}
.mli{font-size:10px;color:var(--text-muted);padding:3px 0;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;gap:8px;}
.mli:last-child{border-bottom:none;}
.mli b{color:var(--text);font-weight:500;}

/* MISC */
.empty-state{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:12px;line-height:1.7;white-space:pre-line;}
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-size:12px;padding:8px 16px;border-radius:20px;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="llogo">🏨</div>
    <div class="ltitle">Hotel Manager</div>
    <div class="lsub">Kirjaudu sisään · Войдите в систему</div>
    <input type="email"    id="l-email" placeholder="Email" autocomplete="username">
    <input type="password" id="l-pass"  placeholder="Salasana / Пароль" autocomplete="current-password">
    <button class="lbtn" onclick="doLogin()">Kirjaudu / Войти</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app-screen">
  <div class="appbar">
    <div class="abl">
      <div class="abn" id="u-name"></div>
      <div class="abr" id="u-role"></div>
    </div>
    <button class="logout-btn" id="logout-btn" onclick="doLogout()">Выйти</button>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num n-occ" id="s-occ">0</div><div class="stat-lbl">Занято</div></div>
    <div class="stat"><div class="stat-num n-emp" id="s-emp">0</div><div class="stat-lbl">Свободно</div></div>
    <div class="stat"><div class="stat-num n-need" id="s-need">0</div><div class="stat-lbl">Убрать</div></div>
    <div class="stat"><div class="stat-num n-done" id="s-done">0</div><div class="stat-lbl">Убрано</div></div>
  </div>

  <div class="bkf-bar">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div><div class="bkf-big2" id="bkf-total">0</div><div class="bkf-lbl2">завтраков сегодня</div></div>
    </div>
    <div class="bkf-times" id="bkf-times"></div>
  </div>

  <div class="main-tabs" id="main-tabs"></div>
  <div id="main-content"></div>
</div>

<div class="modal-bg" id="mbg" onclick="closeMaybe(event)">
  <div class="modal"><h3 id="mtitle"></h3><div id="mcontent"></div></div>
</div>

</body>
</html>
