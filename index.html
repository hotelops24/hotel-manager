// ── Утилиты ───────────────────────────────────
const ds = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addD = (base,n) => { const d=new Date(base+'T12:00:00'); d.setDate(d.getDate()+n); return d; };
const todayStr = () => ds(new Date());
const fd = (s,lang='ru') => {
  if(!s) return '—';
  const p=s.split('-');
  return `${p[2]}.${p[1]}`;
};
const fdt = (ts,lang='ru') => {
  if(!ts) return '';
  const d=new Date(ts);
  const t=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const l=T[lang]||T.ru;
  return d.toDateString()===new Date().toDateString()?`${l.today} ${t}`:`${d.getDate()}.${d.getMonth()+1} ${t}`;
};
const dayName = (s,lang='ru') => (T[lang]||T.ru).days_ru[new Date(s+'T12:00:00').getDay()];

};
const ROLE_ICONS = { hotel:'🏨', senior:'👔', cleaner:'🧹', admin:'⚙' };

// ── Firebase слушатели ─────────────────────────
function startListeners() {
  onValue(ref(db,'objects'), snap => { objects=snap.val()||{}; renderAll(); });
  onValue(ref(db,'queue'),   snap => { queue=snap.val()||{};   renderAll(); });
  onValue(ref(db,'bkfSchedule'), snap => { bkfSchedule=snap.val()||{}; renderAll(); });
  onValue(ref(db,'changelog'),   snap => {
    const raw=snap.val()||{};
    changelog=Object.values(raw).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,100);
    renderAll();
  });
  onValue(ref(db,'users'), snap => { users=snap.val()||{}; });
}

// ── WhatsApp ───────────────────────────────────
async function sendNotifications(fromRole, message) {
  const recipients = NOTIFY_ROUTES[fromRole]||[];
  if(!recipients.length||!WORKER_URL) return;
  const phones=[];
  Object.values(users).forEach(u=>{
    if(recipients.includes(u.role)&&u.phone&&u.active!==false) phones.push(u.phone);
  });
  if(!phones.length) return;
  try {
    await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phones, message:`${ROLE_ICONS[fromRole]||''} ${currentUserName}: ${message}`})
    });
  } catch(e){ console.warn('WA:',e); }
}

// ── Вспомогательные ───────────────────────────
const t = k => (T[lang]||T.ru)[k]||k;

function ostatus(o) {
  if(!o) return 'emp';
  if(o.checkout) return 'co';
  if(o.checkinDate===todayStr()&&!o.occupied) return 'ci';
  if(o.occupied) return 'occ';
  return 'emp';
}
function olabel(o) {
  if(!o) return t('vacant');
  if(o.checkout) return t('checkout');
  if(o.checkinDate===todayStr()&&!o.occupied) return t('checkin_today');
  if(o.occupied) return t('occupied');
  return t('vacant');
}
function priLabel(o) {
  if(!o) return null;
  if(o.checkout) return t('urgent_checkout');
  if(o.checkinDate===todayStr()&&!o.occupied) return `${t('checkin_at')} ${o.checkinTime||''}`;
  return null;
}
function getBkf(objId, dateS) {
  return bkfSchedule[`${objId}_${dateS}`]||{time:'08:00',noBkf:false};
}
function calcBkfDay(dateS) {
  const map={}; let total=0;
  Object.values(objects).forEach(o=>{
    if(!o.occupied||!o.checkinDate||!o.checkoutDate) return;
    if(dateS<o.checkinDate||dateS>o.checkoutDate) return;
    const b=getBkf(o.id,dateS);
    if(!b.noBkf){ total+=o.guests||1; if(!map[b.time])map[b.time]=[]; map[b.time].push(o); }
  });
  return{total,map};
}

function typeLabel(type) {
  const map={room:t('type_room'),hostel_room:t('type_hostel_room'),hostel_bed:t('type_hostel_bed'),apartment:t('type_apartment'),restaurant:t('type_restaurant')};
  return map[type]||type||'';
}

// ── Действия ──────────────────────────────────
async function saveObject(objId) {
  const o=objects[objId]; if(!o) return;
  const prevSt=ostatus(o);
  const v      = document.getElementById('m-st')?.value;
  const cinD   = document.getElementById('m-cind')?.value;
  const cinT   = document.getElementById('m-cint')?.value;
  const coutD  = document.getElementById('m-coutd')?.value;
  const coutT  = document.getElementById('m-coutt')?.value;
  const cl     = document.getElementById('m-cl')?.value;
  const bkfEl  = document.getElementById('m-bkf')?.value;
  const bkfTEl = document.getElementById('m-bkft')?.value;
  const guests = parseInt(document.getElementById('gc')?.textContent)||o.guests||1;

  const upd={guests};
  if(v){upd.occupied=(v==='occ'||v==='co');upd.checkout=(v==='co');}
  if(v==='emp'){upd.checkinDate=null;upd.checkoutDate=null;upd.occupied=false;upd.checkout=false;upd.bkfNeeded=false;}
  if(v==='ci'){upd.checkinDate=todayStr();upd.occupied=false;upd.checkout=false;}
  if(cinD&&v!=='emp')upd.checkinDate=cinD;
  if(cinT)upd.checkinTime=cinT;
  if(coutD&&v!=='emp')upd.checkoutDate=coutD;
  if(coutT)upd.checkoutTime=coutT;
  if(bkfEl){upd.bkfNeeded=(bkfEl==='yes');}
  if(bkfTEl&&upd.bkfNeeded!==false)upd.bkfTime=bkfTEl;
  if(cl){upd.skipClean=(cl==='skip');upd.cleanStatus=cl==='skip'?'dirty':cl;}
  upd.lastChangedBy=currentUserName;upd.lastChangedAt=Date.now();

  await update(ref(db,`objects/${objId}`),upd);
  const merged={...o,...upd};
  const newSt=ostatus(merged);
  const changes=[];
  if(newSt!==prevSt) changes.push(`${t('occupied')} → "${olabel(merged)}"`);
  if(upd.checkinDate) changes.push(`${t('checkin_date')}: ${fd(upd.checkinDate)} ${upd.checkinTime||''}`);
  if(upd.checkoutDate) changes.push(`${t('checkout_date')}: ${fd(upd.checkoutDate)} ${upd.checkoutTime||''}`);
  if(cl==='cleaned') changes.push(t('cleaned'));

  if(changes.length){
    const msg=`${o.name}: ${changes.join(' · ')}`;
    await addLog(objId,msg,'#1a6e5a');
    await sendNotifications(currentRole,msg);
  }
  if(merged.checkout||(!merged.occupied&&prevSt==='occ')) await addToQueue(objId,'clean');
  if(merged.occupied&&!merged.checkout&&merged.checkinDate&&merged.checkoutDate){
    if(merged.bkfNeeded) await addToQueue(objId,'bkf');
    const bkfUpd={};
    let d=new Date(merged.checkinDate+'T12:00:00');
    const end=new Date(merged.checkoutDate+'T12:00:00');
    while(d<=end){
      const dstr=ds(d);
      const key=`${objId}_${dstr}`;
      if(!bkfSchedule[key]) bkfUpd[key]={time:merged.bkfTime||'08:00',noBkf:false};
      d=addD(dstr,1);
    }
    if(Object.keys(bkfUpd).length) await update(ref(db,'bkfSchedule'),bkfUpd);
  }
  closeModal();
}
window.saveObject=saveObject;

async function addToQueue(objId,type){
  if(!Object.values(queue).find(q=>q.roomId===objId&&q.type===type&&!q.done))
    await push(ref(db,'queue'),{roomId:objId,type,assignedTo:[],done:false,createdAt:Date.now()});
}

async function toggleAssign(taskId,userId){
  const task=queue[taskId]; if(!task) return;
  const a=[...(task.assignedTo||[])];
  const idx=a.indexOf(userId);
  if(idx>=0)a.splice(idx,1); else a.push(userId);
  await update(ref(db,`queue/${taskId}`),{assignedTo:a});
}
window.toggleAssign=toggleAssign;

async function confirmAssign(taskId){
  const task=queue[taskId]; if(!task||!(task.assignedTo||[]).length) return;
  const o=objects[task.roomId];
  const names=(task.assignedTo||[]).map(uid=>{const u=Object.values(users).find(u=>u.id===uid);return u?.name||'';}).filter(Boolean);
  const tl=task.type==='clean'?t('cleaning'):t('bkf');
  const msg=`${o?.name||task.roomId}: ${t('assign')} → ${names.join(' + ')} (${tl})`;
  await addLog(task.roomId,msg,'#6a4ecf');
  for(let i=0;i<task.assignedTo.length;i++){
    const uid=task.assignedTo[i];
    const u=Object.values(users).find(u=>u.id===uid);
    if(u?.phone&&WORKER_URL){
      const others=names.filter((_,j)=>j!==i);
      const m=`👔 ${currentUserName}: ${o?.name}: ${tl}${others.length?' · '+t('together_with')+' '+others.join(', '):''}${o?.checkoutDate?' · '+fd(o.checkoutDate)+' '+o.checkoutTime:''}`;
      try{ await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phones:[u.phone],message:m})}); }catch(e){}
    }
  }
  await sendNotifications('senior',msg);
  showToast(t('saved'));
}
window.confirmAssign=confirmAssign;

async function markDone(taskId,cleanerId){
  const task=queue[taskId]; if(!task) return;
  const o=objects[task.roomId];
  const u=Object.values(users).find(u=>u.id===cleanerId);
  await update(ref(db,`queue/${taskId}`),{done:true,doneBy:cleanerId,doneAt:Date.now()});
  if(task.type==='clean') await update(ref(db,`objects/${task.roomId}`),{cleanStatus:'cleaned',lastChangedBy:u?.name,lastChangedAt:Date.now()});
  const lbl=task.type==='clean'?t('cleaning'):t('bkf');
  const msg=`${o?.name||task.roomId}: ✓ ${lbl} (${u?.name||''})`;
  await addLog(task.roomId,msg,'#2a7acf');
  await sendNotifications('cleaner',msg);
  renderAll();
}
window.markDone=markDone;

async function markIssue(taskId,cleanerId){
  const task=queue[taskId]; if(!task) return;
  const o=objects[task.roomId];
  const u=Object.values(users).find(u=>u.id===cleanerId);
  const msg=`${o?.name||task.roomId}: ⚠ ${t('problem')} (${u?.name||''})`;
  await addLog(task.roomId,msg,'#e24b4a');

}

async function saveBkfDay(objId,dateS){
  const el=document.getElementById(`bt-${objId}-${dateS}`); if(!el) return;
  const cur=getBkf(objId,dateS);
  await update(ref(db,`bkfSchedule/${objId}_${dateS}`),{time:el.value,noBkf:cur.noBkf||false});
  const o=objects[objId];
  const msg=`${o?.name}: ${t('breakfast_time')} ${fd(dateS)} → ${el.value}`;
  await addLog(objId,msg,'#b85c00');
  await sendNotifications(currentRole,msg);
  const ok=document.getElementById(`ok-${objId}-${dateS}`);
  if(ok){ok.style.display='inline';setTimeout(()=>ok.style.display='none',2000);}
}
window.saveBkfDay=saveBkfDay;

async function toggleNoBkf(objId,dateS){
  const cur=getBkf(objId,dateS);
  await update(ref(db,`bkfSchedule/${objId}_${dateS}`),{time:cur.time,noBkf:!cur.noBkf});
  const o=objects[objId];
  const msg=`${o?.name}: ${t('breakfast_today')} ${fd(dateS)} — ${!cur.noBkf?t('skip'):t('restored')}`;
  await addLog(objId,msg,'#b85c00');
  await sendNotifications(currentRole,msg);
}
window.toggleNoBkf=toggleNoBkf;

  const newRef=push(ref(db,'objects'));
  await set(newRef,{
    id:newRef.key, name:nameEl.value, type:typeEl?.value||'room',
    floor:floorEl?.value||'', occupied:false, checkout:false, guests:0,
    checkinDate:null,checkinTime:'14:00',checkoutDate:null,checkoutTime:'11:00',
    cleanStatus:'dirty',skipClean:false,bkfNeeded:true,
    lastChangedBy:null,lastChangedAt:null

  showToast(t('saved'));
}

function openModal(objId){

  const rLogs=changelog.filter(l=>l.roomId===objId).slice(0,4);
  const miniLog=rLogs.length
    ?rLogs.map(l=>`<div class="mlog-item"><span><b>${l.by}</b> — ${l.action.replace(new RegExp(o.name+':? ?'),'')}</span><span>${fdt(l.ts,lang)}</span></div>`).join('')
    :`<div class="mlog-empty">${t('no_changes')}</div>`;
  const st=ostatus(o);
  document.getElementById('mcontent').innerHTML=`
    <div class="mrow"><label>${t('occupied')}</label>
      <select id="m-st" onchange="mStCh()">

        <option value="ci"  ${o.checkinDate===todayStr()&&!o.occupied?'selected':''}>${t('checkin_today')}</option>

      </div>
      <div class="mrow-2">
        <div><label>${t('checkin_date')}</label><input type="date" id="m-cind" value="${o.checkinDate||todayStr()}"></div>
        <div><label>${t('checkin_time')}</label><input type="time" id="m-cint" value="${o.checkinTime||'14:00'}"></div>
      </div>
      <div class="mrow-2">
        <div><label>${t('checkout_date')}</label><input type="date" id="m-coutd" value="${o.checkoutDate||ds(addD(todayStr(),1))}"></div>
        <div><label>${t('checkout_time')}</label><input type="time" id="m-coutt" value="${o.checkoutTime||'11:00'}"></div>
      </div>
      <div id="bkf-outer" style="${!o.checkout?'':'display:none'}">
        <div class="mrow"><label>${t('breakfast_needed')}</label>
          <select id="m-bkf" onchange="mBkfCh()">
            <option value="yes" ${o.bkfNeeded!==false?'selected':''}>${t('breakfast_needed')}</option>
            <option value="no"  ${o.bkfNeeded===false?'selected':''}>${t('breakfast_not_needed')}</option>
          </select>
        </div>
        <div class="mrow" id="bkf-time-row" style="${o.bkfNeeded!==false?'':'display:none'}">
          <label>${t('breakfast_time')}</label>
          <input type="time" id="m-bkft" value="${o.bkfTime||'08:00'}" min="07:00" max="11:00">
        </div>
      </div>
    </div>
    <div class="mrow"><label>${t('cleaning_required')}</label>
      <select id="m-cl">
        <option value="dirty"   ${o.cleanStatus==='dirty'&&!o.skipClean?'selected':''}>${t('cleaning_required')}</option>
        <option value="cleaned" ${o.cleanStatus==='cleaned'?'selected':''}>${t('cleaned')}</option>

function mStCh(){

}
window.mStCh=mStCh;

function mBkfCh(){
  const v=document.getElementById('m-bkf')?.value;

}
window.mBkfCh=mBkfCh;

function mChg(objId,d){
  const o=objects[objId]; if(!o) return;

  const el=document.getElementById('gc'); if(el)el.textContent=o.guests;

function closeModal(){document.getElementById('mbg').classList.remove('open');}

// ── Рендер ────────────────────────────────────
function updateStats(){
  const oArr=Object.values(objects);
  const qArr=Object.values(queue);
  document.getElementById('s-occ').textContent=oArr.filter(o=>o.occupied&&!o.checkout).length;
  document.getElementById('s-emp').textContent=oArr.filter(o=>!o.occupied).length;
  document.getElementById('s-need').textContent=qArr.filter(q=>!q.done).length;
  document.getElementById('s-done').textContent=qArr.filter(q=>q.done).length;
  const{total,map}=calcBkfDay(todayStr());
  document.getElementById('bkf-total').textContent=total;
  const el=document.getElementById('bkf-times');
  const keys=Object.keys(map).sort();
  el.innerHTML=keys.length
    ?keys.map(k=>`<div class="bslot">${k} — <b>${map[k].reduce((s,o)=>s+(o.guests||1),0)} ${t('portions')}</b></div>`).join('')
    :`<div class="bslot muted">${t('no_log')}</div>`;
}

function getMainTabs(){
  if(currentRole==='hotel')   return [{k:'rooms',l:t('rooms')},{k:'breakfast',l:t('breakfast')},{k:'log',l:t('log')}];
  if(currentRole==='senior')  return [{k:'queue',l:t('tasks')},{k:'rooms',l:t('rooms')},{k:'breakfast',l:t('breakfast')},{k:'log',l:t('log')}];
  if(currentRole==='admin')   return [{k:'rooms',l:t('rooms')},{k:'breakfast',l:t('breakfast')},{k:'users',l:t('users')},{k:'settings',l:t('settings')},{k:'log',l:t('log')}];
  return [{k:'mytasks',l:t('mytasks')},{k:'rooms',l:t('rooms')},{k:'breakfast',l:t('breakfast')}];
}

function setMainTab(k){
  mainTab=k; dayOffset=0;
  document.querySelectorAll('.mt').forEach(b=>b.classList.toggle('active',b.dataset.k===k));
  renderContent();
}
window.setMainTab=setMainTab;

function renderTabs(){
  document.getElementById('main-tabs').innerHTML=getMainTabs()
    .map(tb=>`<button class="mt${mainTab===tb.k?' active':''}" data-k="${tb.k}" onclick="setMainTab('${tb.k}')">${tb.l}</button>`).join('');
}

// Сортировка: выезд → въезд сегодня → занят → свободен
function sortedObjects(){
  return Object.values(objects).sort((a,b)=>{
    const p=o=>{const s=ostatus(o);if(s==='co')return 0;if(s==='ci')return 1;if(s==='occ')return 2;return 3;};
    return p(a)-p(b);
  });
}

function roomsGridHTML(clickable){
  const objs=sortedObjects();
  if(!objs.length) return `<div class="empty-state">${t('no_objects')}</div>`;
  return objs.map(o=>{
    const st=ostatus(o);
    const last=changelog.find(l=>l.roomId===o.id);
    const assignedQ=Object.values(queue).find(q=>q.roomId===o.id&&!q.done&&(q.assignedTo||[]).length>0);
    const assignedNames=assignedQ?(assignedQ.assignedTo||[]).map(uid=>{const u=Object.values(users).find(u=>u.id===uid);return u?.name||'';}).filter(Boolean).join(', '):null;
    const myTask=currentRole==='cleaner'?Object.values(queue).find(q=>q.roomId===o.id&&(q.assignedTo||[]).includes(currentUserId)&&!q.done):null;
    const pri=priLabel(o);
    const todBkf=o.occupied&&!o.checkout?getBkf(o.id,todayStr()):null;
    return `<div class="rc ${st}${clickable?' clickable':''}" ${clickable?`onclick="openModal('${o.id}')"`:''}>
      <div class="rc-num">${o.name}<span class="rc-type">${typeLabel(o.type)}</span></div>
      <div class="rc-st ${st}">${olabel(o)}</div>
      ${o.guests>0?`<div class="rc-ln">${o.guests} ${t('guests').toLowerCase()}</div>`:''}
      ${o.checkinDate&&o.occupied?`<div class="rc-ln green">↓ ${fd(o.checkinDate)} ${o.checkinTime||''}</div>`:''}
      ${o.checkoutDate&&o.occupied?`<div class="rc-ln${o.checkout?' alert':''}">↑ ${fd(o.checkoutDate)} ${o.checkoutTime||''}</div>`:''}
      ${todBkf&&!todBkf.noBkf?`<div class="rc-ln alert">☕ ${todBkf.time}</div>`:o.occupied&&!o.checkout?`<div class="rc-ln muted">☕ ${t('without_breakfast')}</div>`:''}
      ${pri?`<div class="rc-ln alert sml">${pri}</div>`:''}
      ${assignedNames?`<div class="rc-ln blue">→ ${assignedNames}</div>`:''}
      ${myTask?`<div class="mytask-badge">${t('mytasks')}</div>`:''}
      ${last?`<div class="rc-who">${last.by} · ${fdt(last.ts,lang)}</div>`:''}
      <div class="cb ${o.skipClean?'skip':o.cleanStatus}"></div>
    </div>`;
  }).join('');
}

function bkfTodayHTML(){
  const viewDs=ds(addD(todayStr(),dayOffset));
  const{total,map}=calcBkfDay(viewDs);
  const dayLbl=dayOffset===0?t('today'):dayOffset===1?t('tomorrow'):dayOffset===-1?t('yesterday'):`${dayName(viewDs,lang)}, ${fd(viewDs)}`;
  const keys=Object.keys(map).sort();
  const groups=keys.map(k=>{
    const os=map[k]; const cnt=os.reduce((s,o)=>s+(o.guests||1),0);
    return`<div class="tg">
      <div class="tg-head"><div><div class="tg-time">${k}</div><div class="tg-sub">${os.length} ${t('rooms').toLowerCase()}</div></div><div class="tg-cnt">${cnt} ${t('portions')}</div></div>
      <div class="tg-pills">${os.map(o=>`<span class="rpill">${o.name} ×${o.guests||1}</span>`).join('')}</div>
    </div>`;
  }).join('')||`<div class="empty-state">${t('no_queue')}</div>`;
  return`<div class="day-nav">
    <button onclick="dayOffset--;renderContent()">‹</button>
    <div><div class="day-lbl">${dayLbl}</div><div class="day-sub-lbl">${fd(viewDs)}</div></div>
    <button onclick="dayOffset++;renderContent()">›</button>
  </div>
  <div class="bkf-sum-card">
    <div><div class="bkf-big-num">${total}</div><div class="bkf-sub-lbl">${t('breakfast_today')} · ${keys.length} slots</div></div>
    <div class="bkf-right">${Object.values(map).reduce((s,a)=>s+a.length,0)} ${t('rooms').toLowerCase()}</div>
  </div>
  ${groups}`;
}

function bkfEditHTML(){
  const canEdit=currentRole==='hotel'||currentRole==='admin';
  const activeObjs=Object.values(objects).filter(o=>o.occupied&&o.checkinDate&&o.checkoutDate);
  if(!activeObjs.length) return `<div class="empty-state">${t('no_objects')}</div>`;
  return activeObjs.map(o=>{
    const days=[];
    let d=new Date(o.checkinDate+'T12:00:00');
    const end=new Date(o.checkoutDate+'T12:00:00');
    while(d<=end){days.push(ds(d));d=addD(ds(d),1);}
    const daysHtml=days.map(dstr=>{
      const b=getBkf(o.id,dstr); const tod=dstr===todayStr();
      return`<div class="rbk-day${tod?' tod':''}">
        <span class="rbk-date">${tod?'★ ':''}${dayName(dstr,lang)} ${fd(dstr)}</span>
        ${b.noBkf?`<span class="bkf-skip-lbl">${t('skip')}</span>`
          :canEdit?`<input class="ti" type="time" id="bt-${o.id}-${dstr}" value="${b.time}" min="07:00" max="11:00">`
          :`<span class="bkf-time-lbl">${b.time}</span>`}
        ${canEdit?`<button class="nbtn${b.noBkf?' on':''}" onclick="toggleNoBkf('${o.id}','${dstr}')">${b.noBkf?t('restore_bkf'):t('skip_bkf')}</button>`:''}
        ${canEdit&&!b.noBkf?`<button class="sv-btn" onclick="saveBkfDay('${o.id}','${dstr}')">✓</button>`:''}
        <span class="ok-lbl" id="ok-${o.id}-${dstr}" style="display:none">✓</span>
      </div>`;
    }).join('');
    return`<div class="rbk">
      <div class="rbk-top"><div class="rbk-room">${o.name} <span class="rbk-type">${typeLabel(o.type)}</span></div><div class="rbk-meta">${o.guests||1} ${t('guests').toLowerCase()} · ${fd(o.checkinDate)}–${fd(o.checkoutDate)}</div></div>
      ${daysHtml}
    </div>`;
  }).join('');
}

function queueHTML(){
  const unassigned=Object.entries(queue).filter(([,q])=>!q.done)
    .sort(([,a],[,b])=>{
      const p=id=>{const o=objects[id];const s=ostatus(o);if(s==='co')return 0;if(s==='ci')return 1;return 2;};
      return p(a.roomId)-p(b.roomId);
    });
  if(!unassigned.length) return `<div class="queue-panel"><div class="queue-title">${t('tasks')} <span class="qbadge">0</span></div><div class="empty-state">${t('no_queue')}</div></div>`;
  const cleanerUsers=Object.values(users).filter(u=>u.role==='cleaner'&&u.active!==false);
  const items=unassigned.map(([taskId,task])=>{
    const o=objects[task.roomId];
    const tl=task.type==='clean'?t('cleaning'):t('bkf');
    const pri=o?priLabel(o):'';
    const assignedNames=(task.assignedTo||[]).map(uid=>{const u=cleanerUsers.find(u=>u.id===uid);return u?.name||'';}).filter(Boolean);
    const chips=cleanerUsers.map(u=>{
      const sel=(task.assignedTo||[]).includes(u.id);
      return`<div class="cl-chip${sel?' selected':''}" onclick="toggleAssign('${taskId}','${u.id}')"><span>${sel?'✓':''}</span>${u.name}</div>`;
    }).join('');
    return`<div class="qi">
      <div class="qi-top">
        <div class="qi-room">${o?.name||task.roomId} <span class="qi-type-lbl">${typeLabel(o?.type)}</span></div>
        <div class="qi-type">${tl}${o?.checkoutDate?' · '+fd(o.checkoutDate)+' '+(o.checkoutTime||''):''}</div>
        ${pri?`<div class="qi-pri">${pri}</div>`:''}
        ${assignedNames.length?`<div class="qi-asgnd">→ ${assignedNames.join(' + ')}</div>`:''}
      </div>
      <div class="cleaners-multi">${chips||`<div class="muted sml">${t('select_cleaner')}</div>`}</div>
      <div class="assign-bar">
        <button class="abtn" onclick="confirmAssign('${taskId}')" ${(task.assignedTo||[]).length===0?'disabled':''}>
          ${(task.assignedTo||[]).length>0?`${t('assign')} (${task.assignedTo.length})`:t('select_cleaner')}
        </button>
      </div>
    </div>`;
  }).join('');
  return`<div class="queue-panel"><div class="queue-title">${t('tasks')} <span class="qbadge">${unassigned.length}</span></div>${items}</div>`;
}

function myTasksHTML(){
  const myTasks=Object.entries(queue).filter(([,q])=>(q.assignedTo||[]).includes(currentUserId)&&!q.done);
  if(!myTasks.length) return `<div class="empty-state">${t('no_tasks')}</div>`;
  return myTasks.map(([taskId,task])=>{
    const o=objects[task.roomId];
    const tc=task.type==='bkf'?'bkf':'clean';
    const tl=task.type==='clean'?t('cleaning'):t('bkf');
    const pri=o?priLabel(o):'';
    const others=(task.assignedTo||[]).filter(id=>id!==currentUserId)
      .map(uid=>{const u=Object.values(users).find(u=>u.id===uid);return u?.name||'';}).filter(Boolean);
    const todBkf=task.type==='bkf'&&o?getBkf(o.id,todayStr()):null;
    const detail=task.type==='clean'
      ?`${t('cleaning')}: ${o?.name}${o?.floor?' ('+o.floor+' '+t('floor')+'.)':''}`
      :`${t('bkf')}: ${todBkf?.time||'—'} · ${o?.guests||1} ${t('portions')} → ${o?.name}`;
    return`<div class="task-card">
      <div class="task-top"><div class="task-room">${o?.name||task.roomId}</div><span class="tbadge ${tc}">${tl}</span></div>
      ${pri?`<div class="task-pri">${pri}</div>`:''}
      ${others.length?`<div class="task-together">${t('together_with')} ${others.join(', ')}</div>`:''}
      <div class="task-detail">${detail}${o?.checkoutDate?`<br>↑ ${fd(o.checkoutDate)} ${o.checkoutTime||''}`:''}</div>
      <div class="tact">
        <button class="done-btn" onclick="markDone('${taskId}','${currentUserId}')">${t('done')}</button>
        <button class="issue-btn" onclick="markIssue('${taskId}','${currentUserId}')">${t('problem')}</button>
      </div>
    </div>`;
  }).join('');
}

    <div class="adm-title">${t('add_object')}</div>
    <div class="new-form">
      <input type="text" id="new-obj-name"  placeholder="${t('object_name')}" class="uin">
      <select id="new-obj-type" class="usel">
        <option value="room">${t('type_room')}</option>
        <option value="hostel_room">${t('type_hostel_room')}</option>
        <option value="hostel_bed">${t('type_hostel_bed')}</option>
        <option value="apartment">${t('type_apartment')}</option>
        <option value="restaurant">${t('type_restaurant')}</option>
      </select>

      <button class="adm-sv" onclick="addObject()">${t('add_object')}</button>
    </div>

}

function renderContent(){
  const mc=document.getElementById('main-content'); if(!mc) return;
  const canClick=currentRole==='hotel'||currentRole==='admin';
  let html='';
  if(mainTab==='rooms'){
    html=`<div class="section-lbl">${t('rooms')}${canClick?' — '+t('save').toLowerCase():''}... </div>
      <div class="rooms-grid">${roomsGridHTML(canClick)}</div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:#1a6e5a"></div>${t('occupied')}</div>
        <div class="li"><div class="ld" style="background:#b85c00"></div>${t('checkout')}</div>
        <div class="li"><div class="ld" style="background:#2a7acf"></div>${t('checkin_today')}</div>
        <div class="li"><div class="ld" style="background:var(--border)"></div>${t('vacant')}</div>
      </div>`;
  } else if(mainTab==='breakfast'){
    const canEdit=currentRole==='hotel'||currentRole==='admin';
    html=`<div class="sub-tabs">
      <button class="st${subTab==='day'?' active':''}" onclick="subTab='day';renderContent()">${t('today')}</button>
      ${canEdit?`<button class="st${subTab==='edit'?' active':''}" onclick="subTab='edit';renderContent()">${t('edit_bkf')}</button>`:''}
    </div>`;
    html+=subTab==='edit'&&canEdit?bkfEditHTML():bkfTodayHTML();
  } else if(mainTab==='log'){
    html=`<div class="section-lbl">${t('log')}</div>${logHTML()}`;
  } else if(mainTab==='queue'){
    html=queueHTML()+`<div class="section-lbl" style="margin-top:.75rem;">${t('rooms')}</div><div class="rooms-grid">${roomsGridHTML(false)}</div>`;
  } else if(mainTab==='mytasks'){
    html=myTasksHTML();
  } else if(mainTab==='users'){
    html=usersHTML();
  } else if(mainTab==='settings'){
    html=settingsHTML();
  }
  mc.innerHTML=html;
}

function renderAll(){
  updateStats(); renderTabs(); renderContent();
}

// ── Авторизация ───────────────────────────────
onAuthStateChanged(auth, async user=>{
  if(user){
    currentUser=user;
    const snap=await get(ref(db,'users'));
    const allUsers=snap.val()||{};
    const found=Object.values(allUsers).find(u=>u.email===user.email);
    if(found){
      if(found.active===false){ await signOut(auth); showLoginError(t('access_disabled')); return; }
      currentRole=found.role||'cleaner';
      currentUserId=found.id;
      currentUserName=found.name;
    } else {
      currentRole='admin'; currentUserId=user.uid; currentUserName=user.email;
      await set(ref(db,`users/${user.uid}`),{id:user.uid,name:user.email,email:user.email,phone:'',role:'admin',active:true,createdAt:Date.now()});
    }
    // Язык по роли
    lang = currentRole==='hotel' ? 'fi' : 'ru';
    mainTab={hotel:'rooms',senior:'queue',admin:'rooms',cleaner:'mytasks'}[currentRole]||'rooms';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('user-name').textContent=currentUserName;
    document.getElementById('user-role').textContent=(T[lang]||T.ru)[`role_${currentRole}`]||currentRole;
    startListeners();
  } else {
    currentUser=null;
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

window.doLogin=async()=>{
  const email=document.getElementById('l-email')?.value;
  const pass=document.getElementById('l-pass')?.value;
  if(!email||!pass){showLoginError('Email + пароль');return;}
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){ showLoginError(T.ru.wrong_password); }
};
window.doLogout=async()=>{ await signOut(auth); };
window.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen')?.style.display!=='none') window.doLogin();
});

function showLoginError(msg){
  const el=document.getElementById('login-error');
  if(el){el.textContent=msg;el.style.display='block';}
}
function showToast(msg){
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);
}
window.showToast=showToast;
</script>

.muted{color:var(--text-muted)!important;}
.sml{font-size:10px!important;}
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-size:12px;padding:8px 16px;border-radius:20px;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏨</div>
    <div class="login-title">Hotel Manager</div>
    <div class="login-sub">Kirjaudu sisään / Войдите в систему</div>
    <input type="email"    id="l-email" placeholder="Email" autocomplete="username">
    <input type="password" id="l-pass"  placeholder="Salasana / Пароль" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Kirjaudu / Войти</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app-screen">
  <div class="appbar">
    <div class="appbar-left">
      <div class="appbar-name" id="user-name"></div>
      <div class="appbar-role" id="user-role"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()" id="logout-btn">Выйти</button>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num n-occ" id="s-occ">0</div><div class="stat-lbl" id="sl-occ">Занято</div></div>
    <div class="stat"><div class="stat-num n-emp" id="s-emp">0</div><div class="stat-lbl" id="sl-emp">Свободно</div></div>
    <div class="stat"><div class="stat-num n-need" id="s-need">0</div><div class="stat-lbl" id="sl-need">Убрать</div></div>
    <div class="stat"><div class="stat-num n-done" id="s-done">0</div><div class="stat-lbl" id="sl-done">Убрано</div></div>
  </div>

  <div class="bkf-bar">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div><div class="bkf-big" id="bkf-total">0</div><div class="bkf-sub-lbl2" id="bkf-lbl">Завтраков сегодня</div></div>
    </div>
    <div class="bkf-times" id="bkf-times"></div>
  </div>

  <div class="main-tabs" id="main-tabs"></div>
  <div id="main-content"></div>
</div>

<div class="modal-bg" id="mbg" onclick="closeMaybe(event)">
  <div class="modal"><h3 id="mtitle"></h3><div id="mcontent"></div></div>
</div>

</body>
</html>
